async function handleStart() {
  const inp = el('meet-title-input');
  const defaultTitle = `Meeting — ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
  const title = (inp?.value||'').trim() || defaultTitle;
  await startRecording(title);
}

async function handleStop() {
  S.saving = true; render();
  try {
    const result = await stopRecording();
    const {audioBlob, ...mdata} = result;
    const saved = await dbSave(mdata, audioBlob);
    S.meetings.unshift(saved);
    S.selected = saved;
    S.tab = 'detail';
    S.saving = false;
    render();
    // Auto-summarize if AI key set and setting on
    if (CFG.aiKey && CFG.autoSum && saved.transcript?.length > 0) {
      doGenerateSummaryFor(saved);
    }
  } catch(e) {
    S.error = 'Save failed: '+e.message;
    S.tab = 'home';
    S.saving = false;
    render();
  }
}

async function doGenerateSummary() {
  if (!S.selected) return;
  await doGenerateSummaryFor(S.selected);
}

async function doGenerateSummaryFor(meeting) {
  S.aiWorking = true; S.aiError = ''; render();
  try {
    const sum = await generateAISummary(meeting);
    if (sum) saveSummaryLocal(meeting.id, sum);
    S.aiWorking = false; render();
  } catch(e) {
    S.aiError = e.message; S.aiWorking = false; render();
  }
}

async function doRegenerateSummary() {
  if (!S.selected) return;
  deleteSummaryLocal(S.selected.id);
  await doGenerateSummaryFor(S.selected);
}

function dismissSummary() {
  if (!S.selected) return;
  deleteSummaryLocal(S.selected.id);
  render();
}

async function doCleanTranscript() {
  if (!S.selected) return;
  S.aiWorking = true; S.aiError = ''; render();
  try {
    const fixes = await cleanTranscriptWithAI(S.selected);
    if (fixes?.length) {
      const fixMap = Object.fromEntries(fixes.map(f=>[String(f.id), f.text]));
      S.selected.transcript = S.selected.transcript.map(l=>({
        ...l, text: fixMap[String(l.id)] || l.text
      }));
      S.selected.wordCount = S.selected.transcript.reduce((a,l)=>a+l.text.split(/\s+/).length,0);
      // Persist the cleaned transcript
      const all = localLoad();
      const idx = all.findIndex(m=>String(m.id)===String(S.selected.id));
      if (idx>=0) {
        all[idx].transcript = S.selected.transcript;
        all[idx].wordCount  = S.selected.wordCount;
        localSave(all);
      }
      // Also update in meetings array
      const mi = S.meetings.findIndex(m=>String(m.id)===String(S.selected.id));
      if (mi>=0) S.meetings[mi] = {...S.meetings[mi], ...S.selected};
    }
    S.aiWorking = false; render();
  } catch(e) {
    S.aiError = e.message; S.aiWorking = false; render();
  }
}

function viewMeeting(id) {
  S.selected = S.meetings.find(m=>String(m.id)===String(id))||null;
  S.tab = 'detail'; S.aiError = ''; render();
}

let searchTimer = null;
async function handleSearch(q) {
  const x = el('search-x'); if (x) x.style.display = q ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const found = await dbSearch(q);
    const list = el('meetings-list'); if (!list) return;
    if (found.length===0) {
      list.innerHTML = `<div class="empty">${q?`No meetings match "${esc(q)}"`:'No meetings yet.'}</div>`;
    } else {
      list.innerHTML = found.map(m=>{
        const sum = getSummary(m.id);
        return `
      <div class="meet-row">
        <button class="meet-row-main" onclick="viewMeeting('${esc(m.id)}')">
          <div class="meet-row-top">
            <span class="meet-row-title">${esc(m.title)}</span>
            <span class="meet-row-dur">${fmt(m.duration)}</span>
          </div>
          <div class="meet-row-meta">
            <span>${fmtDate(m.date)}</span>
            <span>·</span>
            <span>${m.wordCount} words</span>
            ${m.hasSystem?'<span class="chip chip-green">System</span>':''}
            ${m.audioUrl?'<span class="chip chip-blue">▶ Audio</span>':''}
            ${sum?'<span class="chip chip-purple">✦ AI</span>':''}
          </div>
          ${sum ? `<p class="meet-row-preview">${esc(sum.summary)}</p>`
                 : m.transcript?.[0]?`<p class="meet-row-preview">"${esc(m.transcript[0].text)}"</p>`:''}
        </button>
        <div class="meet-row-del">
          <button class="icon-btn" onclick="confirmDel(event,'${esc(m.id)}')" title="Delete">🗑</button>
        </div>
      </div>`}).join('');
    }
  }, 300);
}

function clearSearch() {
  const inp = el('search-input'); if (inp) inp.value = '';
  const x = el('search-x'); if (x) x.style.display = 'none';
  handleSearch('');
}

function confirmDel(evt, id) {
  evt.stopPropagation();
  const wrap = evt.currentTarget.closest('.meet-row-del');
  wrap.innerHTML = `<div class="confirm-del">
    <span>Delete?</span>
    <button class="btn btn-red btn-xs" onclick="doDelete(event,'${esc(id)}')">Yes</button>
    <button class="btn btn-ghost btn-xs" onclick="cancelDel(event)">No</button>
  </div>`;
}

async function doDelete(evt, id) {
  evt.stopPropagation();
  try {
    await dbDelete(id);
    S.meetings = S.meetings.filter(m=>String(m.id)!==String(id));
    render();
  } catch(e) { alert('Delete failed: '+e.message); }
}

function cancelDel(evt) {
  evt.stopPropagation();
  const row = evt.currentTarget.closest('.meet-row');
  const wrap = row?.querySelector('.meet-row-del');
  if (!wrap) return;
  const id = row.querySelector('.meet-row-main')?.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
  wrap.innerHTML = `<button class="icon-btn" onclick="confirmDel(event,'${esc(id||'')}')" title="Delete">🗑</button>`;
}

function confirmDelDetail() {
  const acts = document.querySelector('.detail-acts');
  if (!acts) return;
  acts.innerHTML = `<div class="confirm-del-inline">
    <span>Delete this meeting?</span>
    <button class="btn btn-red btn-xs" onclick="doDeleteDetail()">Yes, delete</button>
    <button class="btn btn-ghost btn-xs" onclick="render()">Cancel</button>
  </div>`;
}

async function doDeleteDetail() {
  const id = S.selected?.id; if (!id) return;
  try {
    await dbDelete(id);
    S.meetings = S.meetings.filter(m=>String(m.id)!==String(id));
    S.selected = null; S.tab = 'meetings'; render();
  } catch(e) { alert('Delete failed: '+e.message); }
}

function highlightTranscript(q) {
  document.querySelectorAll('#transcript-body .t-text').forEach(elem=>{
    const raw = elem.getAttribute('data-raw')||elem.textContent;
    elem.setAttribute('data-raw',raw);
    if (!q.trim()) { elem.innerHTML = esc(raw); return; }
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    elem.innerHTML = esc(raw).replace(re,'<mark>$1</mark>');
  });
}

function clearDetailSearch() {
  const inp = el('detail-search'); if (inp) inp.value = '';
  highlightTranscript('');
}

function copyTranscript() {
  const m = S.selected; if (!m) return;
  const sum = getSummary(m.id);
  let text = `${m.title}\n${fmtDate(m.date)} · ${fmt(m.duration)} · ${m.wordCount} words\n\n`;
  if (sum) text += `Summary:\n${sum.summary}\n\n`;
  text += m.transcript.map(l=>`[${l.ts||''}] ${l.speaker}: ${l.text}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.querySelector('.detail-acts .btn-ghost');
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(()=>{btn.textContent='⎘ Copy';},2000); }
  });
}

function exportTxt() {
  const m = S.selected; if (!m) return;
  const sum = getSummary(m.id);
  const lines = [
    `VoiceLog Transcript`, ``,
    `Title:    ${m.title}`,
    `Date:     ${fmtDate(m.date)}`,
    `Duration: ${fmt(m.duration)}`,
    `Words:    ${m.wordCount}`, ``,
  ];
  if (sum) {
    lines.push(`── AI Summary ──`, ``, sum.summary, ``);
    if (sum.keyPoints?.length)   lines.push(`Key Points:`, ...sum.keyPoints.map(p=>`  • ${p}`), ``);
    if (sum.actionItems?.length) lines.push(`Action Items:`, ...sum.actionItems.map(a=>`  • ${a}`), ``);
  }
  lines.push(`── Transcript ──`, ``, ...m.transcript.map(l=>`[${l.ts||''}] ${l.speaker}: ${l.text}`));
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/plain'}));
  a.download = m.title.replace(/[^a-z0-9]/gi,'_')+'.txt';
  a.click();
}

function exportMd() {
  const m = S.selected; if (!m) return;
  const sum = getSummary(m.id);
  const lines = [
    `# ${m.title}`, ``,
    `**Date:** ${fmtDate(m.date)}  `,
    `**Duration:** ${fmt(m.duration)}  `,
    `**Words:** ${m.wordCount}`, ``,
  ];
  if (sum) {
    lines.push(`## Summary`, ``, sum.summary, ``);
    if (sum.keyPoints?.length)   lines.push(`### Key Points`, ...sum.keyPoints.map(p=>`- ${p}`), ``);
    if (sum.actionItems?.length) lines.push(`### Action Items`, ...sum.actionItems.map(a=>`- [ ] ${a}`), ``);
  }
  lines.push(`## Transcript`, ``);
  lines.push(...m.transcript.map(l=>`**\`[${l.ts||''}]\` ${l.speaker}:** ${l.text}`));
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/markdown'}));
  a.download = m.title.replace(/[^a-z0-9]/gi,'_')+'.md';
  a.click();
}

/* ─── Inline transcript editing ─────────────────────────*/
function editLine(idx) {
  const m = S.selected; if (!m?.transcript?.[idx]) return;
  const wrap = document.getElementById(`tl-detail-${idx}`)?.querySelector('.t-text-wrap');
  const p    = document.getElementById(`t-text-${idx}`);
  if (!wrap || !p || wrap.querySelector('.t-text-edit')) return; // already editing
  const orig = m.transcript[idx].text;
  wrap.innerHTML = `
    <textarea class="t-text-edit" id="t-edit-${idx}" rows="2">${esc(orig)}</textarea>
    <div class="t-edit-row">
      <button class="btn btn-primary btn-xs" onclick="saveLineEdit(${idx})">Save</button>
      <button class="btn btn-ghost btn-xs" onclick="cancelLineEdit(${idx}, '${esc(orig).replace(/'/g,"&#39;")}')">Cancel</button>
    </div>`;
  const ta = document.getElementById(`t-edit-${idx}`);
  if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
}

function saveLineEdit(idx) {
  const m = S.selected; if (!m?.transcript?.[idx]) return;
  const ta = document.getElementById(`t-edit-${idx}`);
  if (!ta) return;
  const newText = ta.value.trim();
  if (!newText) return;
  m.transcript[idx].text = newText;
  m.wordCount = m.transcript.reduce((a,l)=>a+l.text.split(/\s+/).length,0);
  _persistEdits();
  render();
}

function cancelLineEdit(idx, orig) {
  const wrap = document.getElementById(`tl-detail-${idx}`)?.querySelector('.t-text-wrap');
  if (!wrap) return;
  wrap.innerHTML = `<p class="t-text" id="t-text-${idx}" data-raw="${esc(orig)}">${esc(orig)}</p>`;
  // re-attach click
  wrap.onclick = () => editLine(idx);
}

function editSpeaker(idx) {
  const m = S.selected; if (!m?.transcript?.[idx]) return;
  const lbl = document.querySelector(`.speaker-label-${idx}`);
  if (!lbl || lbl.querySelector('input')) return;
  const orig = m.transcript[idx].speaker;
  // Collect unique speakers for quick suggestions
  const speakers = [...new Set(m.transcript.map(l=>l.speaker))];
  const opts = speakers.map(s=>`<option value="${esc(s)}">`).join('');
  lbl.outerHTML = `
    <span class="speaker-edit-wrap">
      <datalist id="spk-dl-${idx}">${opts}</datalist>
      <input class="speaker-edit-inp" id="spk-inp-${idx}" list="spk-dl-${idx}"
        value="${esc(orig)}"
        onblur="saveSpeaker(${idx})"
        onkeydown="if(event.key==='Enter')saveSpeaker(${idx});if(event.key==='Escape')cancelSpeaker(${idx},'${esc(orig).replace(/'/g,"&#39;")}')"/>
    </span>`;
  const inp = document.getElementById(`spk-inp-${idx}`);
  if (inp) { inp.focus(); inp.select(); }
}

function saveSpeaker(idx) {
  const m = S.selected; if (!m?.transcript?.[idx]) return;
  const inp = document.getElementById(`spk-inp-${idx}`);
  const newName = (inp?.value||'').trim() || m.transcript[idx].speaker;
  const oldName = m.transcript[idx].speaker;
  // Ask: rename all occurrences of this speaker?
  const renameAll = m.transcript.filter(l=>l.speaker===oldName).length > 1
    && confirm(`Rename all lines by "${oldName}" to "${newName}"?`);
  if (renameAll) {
    m.transcript.forEach(l=>{ if (l.speaker===oldName) l.speaker=newName; });
  } else {
    m.transcript[idx].speaker = newName;
  }
  _persistEdits();
  render();
}

function cancelSpeaker(idx, orig) {
  render();
}

function _persistEdits() {
  const m = S.selected; if (!m) return;
  // Update meetings array
  const mi = S.meetings.findIndex(x=>String(x.id)===String(m.id));
  if (mi>=0) S.meetings[mi] = {...S.meetings[mi], transcript:m.transcript, wordCount:m.wordCount};
  // Persist to localStorage
  if (!isCloud()) {
    const all = localLoad();
    const idx = all.findIndex(x=>String(x.id)===String(m.id));
    if (idx>=0) { all[idx].transcript=m.transcript; all[idx].wordCount=m.wordCount; localSave(all); }
  }
  // In cloud mode: we could upsert but that would need line-by-line updates;
  // for now we only persist locally and note it's unsaved to cloud.
}

/* ─── Export helpers ────────────────────────────────────*/
function exportJson() {
  const m = S.selected; if (!m) return;
  const sum = getSummary(m.id);
  const payload = {
    id: m.id,
    title: m.title,
    date: m.date instanceof Date ? m.date.toISOString() : m.date,
    duration: m.duration,
    wordCount: m.wordCount,
    hasMic: m.hasMic,
    hasSystem: m.hasSystem,
    ...(sum ? {aiSummary: sum} : {}),
    transcript: m.transcript.map(l=>({
      ts: l.ts, speaker: l.speaker, text: l.text,
      confidence: l.confidence || null,
    })),
  };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(payload, null, 2)],{type:'application/json'}));
  a.download = m.title.replace(/[^a-z0-9]/gi,'_')+'.json';
  a.click();
}

/* ─── Settings handlers ─────────────────────────────────*/
function updateConfSlider(val) {
  CFG.conf = parseFloat(val);
  const lbl = el('conf-label');
  if (lbl) {
    const v = parseFloat(val);
    lbl.textContent = v === 0 ? 'Off — accept all results'
      : v < 0.5 ? `${Math.round(v*100)}% — lenient`
      : v < 0.75 ? `${Math.round(v*100)}% — moderate`
      : `${Math.round(v*100)}% — strict`;
  }
}

function saveAIKey() {
  const input = el('ai-key-input');
  const key = (input?.value||'').trim();
  const status = el('ai-key-status');
  if (!key) { if (status) status.innerHTML=`<div class="alert alert-err" style="margin-bottom:10px">Please enter your API key.</div>`; return; }
  if (!key.startsWith('sk-ant-')) { if (status) status.innerHTML=`<div class="alert alert-err" style="margin-bottom:10px">Key should start with <code>sk-ant-</code></div>`; return; }
  CFG.aiKey = key;
  if (status) status.innerHTML=`<div class="alert alert-ok" style="margin-bottom:10px">✓ API key saved.</div>`;
  setTimeout(render, 1200);
}

function clearAIKey() {
  CFG.aiKey = '';
  render();
}

async function testSB() {
  const url=(el('sb-url')?.value||'').trim();
  const key=(el('sb-key')?.value||'').trim();
  const status=el('sb-status');
  if(!url||!key){ if(status) status.innerHTML=`<div class="alert alert-err">Please enter both URL and key.</div>`; return; }
  if(status) status.innerHTML=`<div class="loading"><div class="spinner"></div> Testing…</div>`;
  try {
    const sb=window.supabase.createClient(url,key);
    const {error}=await sb.from('meetings').select('id').limit(1);
    if(error) throw error;
    if(status) status.innerHTML=`<div class="alert alert-ok">✓ Connected successfully!</div>`;
  } catch(e) {
    if(status) status.innerHTML=`<div class="alert alert-err">✗ ${esc(e.message)}</div>`;
  }
}

function saveSB() {
  const url=(el('sb-url')?.value||'').trim();
  const key=(el('sb-key')?.value||'').trim();
  const status=el('sb-status');
  if(!url||!key){ if(status) status.innerHTML=`<div class="alert alert-err">Please enter both fields.</div>`; return; }
  localStorage.setItem(SB_CFG_KEY, JSON.stringify({url,key}));
  S.mode='cloud';
  if(status) status.innerHTML=`<div class="alert alert-ok">✓ Saved! Switching to cloud storage…</div>`;
  setTimeout(()=>dbLoad(), 800);
}

function clearSB() {
  localStorage.removeItem(SB_CFG_KEY);
  S.mode='local';
  const status=el('sb-status');
  if(status) status.innerHTML=`<div class="alert alert-ok">Disconnected. Switched to local storage.</div>`;
  setTimeout(()=>dbLoad(), 600);
}

/* ─── Recording notes ───────────────────────────────────*/
function handleNoteKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitNote(); }
}
function submitNote() {
  const inp = el('notes-inp'); if (!inp) return;
  const text = inp.value.trim(); if (!text) return;
  inp.value = '';
  const note = {id: Date.now(), text, ts: fmtTs(), recTime: fmt(S.recTime)};
  S.notes = S.notes || [];
  S.notes.push(note);
  // Reveal notes list if hidden
  const listArea = el('notes-list-area');
  if (listArea) {
    listArea.style.display = '';
    listArea.className = 'notes-list';
    const div = document.createElement('div');
    div.className = 'note-item'; div.id = 'note-'+note.id;
    div.innerHTML = `<span class="note-ts">${esc(note.recTime)}</span>
      <span class="note-text">${esc(note.text)}</span>
      <button class="note-del" onclick="deleteNote(${note.id})" title="Remove">×</button>`;
    listArea.appendChild(div);
  }
}
function deleteNote(id) {
  S.notes = (S.notes||[]).filter(n=>n.id!==id);
  const e2 = document.getElementById('note-'+id); if (e2) e2.remove();
}

/* ─── Speaker management (recording) ───────────────────*/
function bumpSpeaker() {
  S._speakerIdx = (S._speakerIdx + 1) % S._speakerNames.length;
  S._lastSpeechTs = 0; // reset gap timer
  const lbl = el('live-speaker');
  const newName = S._speakerNames[S._speakerIdx];
  if (lbl) { lbl.textContent = newName; lbl.className = speakerColorClass(newName); }
  // Brief visual flash to confirm
  const btn = document.querySelector('[onclick="bumpSpeaker()"]');
  if (btn) { btn.textContent = '✓ ' + newName; setTimeout(()=>btn.textContent='👤+', 1200); }
}

/* ─── Inline title edit (detail view) ──────────────────*/
function editTitle() {
  const m = S.selected; if (!m) return;
  const wrap = document.querySelector('.detail-title-wrap');
  if (!wrap) return;
  const orig = m.title;
  wrap.innerHTML = `
    <input class="title-edit-inp" id="title-edit-inp" value="${esc(orig)}"
      onkeydown="if(event.key==='Enter')saveTitle();if(event.key==='Escape')cancelTitle('${esc(orig).replace(/'/g,"&#39;")}')"/>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button class="btn btn-primary btn-xs" onclick="saveTitle()">Save</button>
      <button class="btn btn-ghost btn-xs" onclick="cancelTitle('${esc(orig).replace(/'/g,"&#39;")}')">Cancel</button>
    </div>`;
  const inp = el('title-edit-inp'); if (inp) { inp.focus(); inp.select(); }
}
function saveTitle() {
  const m = S.selected; if (!m) return;
  const inp = el('title-edit-inp');
  const newTitle = inp?.value.trim() || m.title;
  m.title = newTitle;
  const mi = S.meetings.findIndex(x=>String(x.id)===String(m.id));
  if (mi>=0) S.meetings[mi].title = newTitle;
  if (!isCloud()) {
    const all = localLoad();
    const idx = all.findIndex(x=>String(x.id)===String(m.id));
    if (idx>=0) { all[idx].title = newTitle; localSave(all); }
  }
  render();
}
function cancelTitle(orig) {
  const wrap = document.querySelector('.detail-title-wrap');
  if (wrap) wrap.innerHTML = `
    <h1 class="detail-title" id="detail-title-text">${esc(orig)}</h1>
    <button class="title-edit-btn" onclick="editTitle()" title="Rename meeting">✎</button>`;
}

/* ─── Copy individual transcript line ───────────────────*/
function copyLine(idx) {
  const m = S.selected; if (!m?.transcript?.[idx]) return;
  const l = m.transcript[idx];
  navigator.clipboard.writeText(`[${l.ts||''}] ${l.speaker}: ${l.text}`).then(()=>{
    const btn = document.getElementById(`tl-detail-${idx}`)?.querySelector('.t-copy-btn');
    if (btn) { btn.textContent = '✓'; setTimeout(()=>btn.textContent='⎘', 1500); }
  });
}

/* ─── Star filter toggle ────────────────────────────────*/
let _starFilterOn = false;
function toggleStarFilter() {
  _starFilterOn = !_starFilterOn;
  const m = S.selected; if (!m) return;
  const stars = getStars(m.id);
  const btn = el('star-filter-btn');
  if (btn) btn.style.background = _starFilterOn ? 'var(--yellow-dim)' : '';
  document.querySelectorAll('#transcript-body .t-line').forEach((row, idx) => {
    row.style.display = _starFilterOn && !stars.has(idx) ? 'none' : '';
  });
}

/* ─── Reset speaker colors on new recording ─────────────*/
const _origStartRec = startRecording;
// Patch speaker color cache reset into start recording
const _patchedStart = async (title) => {
  resetSpeakerColors();
  S.notes = [];
  await _origStartRec(title);
};
// Override globally
window.handleStart = async function() {
  const inp = el('meet-title-input');
  const defaultTitle = `Meeting — ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
  const title = (inp?.value||'').trim() || defaultTitle;
  resetSpeakerColors();
  S.notes = [];
  await startRecording(title);
};

/* ─── Save notes when meeting is saved ──────────────────*/
const _origHandleStop = handleStop;
window.handleStop = async function() {
  const notesCopy = [...(S.notes||[])];
  S.saving = true; render();
  try {
    const result = await stopRecording();
    const {audioBlob, ...mdata} = result;
    const saved = await dbSave(mdata, audioBlob);
    S.meetings.unshift(saved);
    S.selected = saved;
    S.tab = 'detail';
    // Save notes
    if (notesCopy.length) saveMeetingNotes(saved.id, notesCopy);
    S.saving = false; render();
    if (CFG.aiKey && CFG.autoSum && saved.transcript?.length > 0) {
      doGenerateSummaryFor(saved);
    }
  } catch(e) {
    S.error = 'Save failed: '+e.message;
    S.tab = 'home'; S.saving = false; render();
  }
};

/* ─── Keyboard shortcuts ────────────────────────────────*/
document.addEventListener('keydown', (e) => {
  // Ctrl+Space — pause / resume during recording
  if (e.ctrlKey && e.code === 'Space' && S.isRec) {
    e.preventDefault();
    S.isPaused ? resumeRecording() : pauseRecording();
    return;
  }
  // Ctrl+Shift+N — new speaker during recording
  if (e.ctrlKey && e.shiftKey && e.code === 'KeyN' && S.isRec && !S.isPaused) {
    e.preventDefault();
    bumpSpeaker();
    return;
  }
  // Ctrl+M — focus notes input during recording
  if (e.ctrlKey && e.code === 'KeyM' && S.isRec) {
    e.preventDefault();
    const inp = el('notes-inp'); if (inp) inp.focus();
    return;
  }
  // Escape — clear detail search
  if (e.code === 'Escape' && S.tab === 'detail') {
    clearDetailSearch();
  }
  // Escape — close export menu
  if (e.code === 'Escape' && _exportMenuOpen) {
    _exportMenuOpen = false;
    const menu = el('export-menu'); if (menu) menu.style.display = 'none';
  }
  // / — focus search on meetings page
  if (e.code === 'Slash' && S.tab === 'meetings' && document.activeElement?.tagName !== 'INPUT') {
    e.preventDefault();
    const inp = el('search-input'); if (inp) inp.focus();
  }
});

/* ─── Init ───────────────────────────────────────────────*/
dbLoad();
</script>
