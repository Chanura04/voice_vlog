<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceLog — Meeting Transcriber</title>
  <meta name="description" content="Record, transcribe and store your meetings — free, in your browser." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
/* ─── tokens ──────────────────────────────────────────── */
:root{
  --bg:#f5f5f3;--surface:#fff;--surface2:#eeede9;--border:#e2e2de;--border2:#ccc;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --red:#dc2626;--red-dim:#fff0f0;--red-b:#fbd0d0;--red-t:#b91c1c;
  --green:#16a34a;--green-dim:#f0fdf4;--green-b:#bbf7d0;--green-t:#15803d;
  --blue:#2563eb;--blue-dim:#eff6ff;--blue-b:#bfdbfe;--blue-t:#1d4ed8;
  --yellow:#ca8a04;--yellow-dim:#fefce8;--yellow-b:#fde68a;--yellow-t:#a16207;
  --purple:#7c3aed;--purple-dim:#f5f3ff;--purple-b:#ddd6fe;--purple-t:#6d28d9;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',system-ui,sans-serif;
  --r:10px;--r-lg:14px;--r-xl:20px;
  --hh:56px;--mw:740px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.05);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0e0e0e;--surface:#191919;--surface2:#242424;--border:#2e2e2e;--border2:#444;
    --text:#e8e8e8;--text2:#999;--text3:#555;
    --red:#f87171;--red-dim:#1f0d0d;--red-b:#7f1d1d;--red-t:#fca5a5;
    --green:#4ade80;--green-dim:#0d1f14;--green-b:#14532d;--green-t:#86efac;
    --blue:#60a5fa;--blue-dim:#0d1929;--blue-b:#1e3a5f;--blue-t:#93c5fd;
    --yellow:#facc15;--yellow-dim:#1c1500;--yellow-b:#713f12;--yellow-t:#fde047;
    --purple:#a78bfa;--purple-dim:#1a1030;--purple-b:#4c1d95;--purple-t:#c4b5fd;
    --shadow:0 1px 4px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04);
  }
}

/* ─── reset ───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#app{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;overflow:hidden;font-size:15px;line-height:1.55}
button{font-family:var(--sans);cursor:pointer}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
mark{background:var(--yellow-dim);color:var(--yellow-t);border-radius:3px;padding:0 3px}

/* ─── layout ──────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.header{height:var(--hh);border-bottom:1px solid var(--border);background:var(--surface);
  padding:0 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;position:relative;z-index:10}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.view{flex:1;overflow-y:auto;padding-bottom:40px}
.wrap{max-width:var(--mw);margin:0 auto;padding:26px 20px}

/* ─── header pieces ───────────────────────────────────── */
.logo{display:flex;align-items:center;gap:9px;background:none;border:none;
  color:var(--text);font-size:16px;font-weight:700;letter-spacing:-.02em;padding:0}
.logo svg{color:var(--red)}
.rec-pill{display:flex;align-items:center;gap:7px;background:var(--red-dim);
  border:1px solid var(--red-b);color:var(--red-t);border-radius:999px;
  padding:3px 12px;font-size:12px;font-weight:600;font-family:var(--mono);
  position:absolute;left:50%;transform:translateX(-50%)}
.rec-pill.paused{background:var(--yellow-dim);border-color:var(--yellow-b);color:var(--yellow-t)}
.rec-dot{width:7px;height:7px;border-radius:50%;background:var(--red);
  animation:blink 1.1s ease-in-out infinite}
.rec-dot.paused{background:var(--yellow);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.storage-chip{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;
  padding:3px 9px;border-radius:999px;border:1px solid var(--border);color:var(--text2)}
.storage-chip.cloud{background:var(--green-dim);color:var(--green-t);border-color:var(--green-b)}
.nav{display:flex;gap:2px}
.nav-btn{background:none;border:1px solid transparent;border-radius:6px;
  padding:5px 13px;font-size:13px;color:var(--text2);transition:all .12s}
.nav-btn:hover:not(:disabled){background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--surface2);border-color:var(--border);color:var(--text);font-weight:500}
.nav-btn:disabled{opacity:.35;cursor:default}
.icon-btn{background:none;border:1px solid var(--border);border-radius:6px;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  color:var(--text2);font-size:16px;transition:all .12s}
.icon-btn:hover:not(:disabled){background:var(--surface2);color:var(--text)}
.icon-btn.active{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.icon-btn:disabled{opacity:.35;cursor:default}

/* ─── buttons ─────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:var(--r);
  padding:8px 16px;font-size:14px;font-weight:500;border:1px solid transparent;transition:all .12s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-xs{padding:3px 9px;font-size:12px}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover:not(:disabled){opacity:.88}
.btn-red{background:var(--red-dim);color:var(--red-t);border-color:var(--red-b)}
.btn-red:hover:not(:disabled){background:var(--red-b)}
.btn-purple{background:var(--purple-dim);color:var(--purple-t);border-color:var(--purple-b)}
.btn-purple:hover:not(:disabled){background:var(--purple-b)}
.btn-yellow{background:var(--yellow-dim);color:var(--yellow-t);border-color:var(--yellow-b)}
.btn-yellow:hover:not(:disabled){background:var(--yellow-b)}
.btn-ghost{background:none;color:var(--text2);border-color:var(--border2)}
.btn-ghost:hover:not(:disabled){background:var(--surface2);color:var(--text)}
.btn-ghost-red{color:var(--red-t)}
.btn-ghost-red:hover:not(:disabled){background:var(--red-dim);border-color:var(--red-b)}
.link-btn{background:none;border:none;color:var(--blue);font-size:13px;padding:4px 0}
.link-btn:hover{text-decoration:underline}

/* ─── inputs / select ─────────────────────────────────── */
input,textarea,select{width:100%;padding:9px 13px;background:var(--surface);color:var(--text);
  border:1px solid var(--border2);border-radius:var(--r);font-size:14px;font-family:var(--sans);
  outline:none;transition:border .12s}
input:focus,textarea:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim)}
input::placeholder,textarea::placeholder{color:var(--text3)}
input[type=range]{padding:4px 0;border:none;box-shadow:none;cursor:pointer;accent-color:var(--blue)}
input[type=range]:focus{box-shadow:none}

/* ─── alerts / badges ─────────────────────────────────── */
.alert{padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:16px;
  display:flex;align-items:flex-start;gap:8px;border:1px solid}
.alert-err{background:var(--red-dim);color:var(--red-t);border-color:var(--red-b)}
.alert-ok{background:var(--green-dim);color:var(--green-t);border-color:var(--green-b)}
.alert-info{background:var(--blue-dim);color:var(--blue-t);border-color:var(--blue-b)}

.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;
  padding:2px 8px;border-radius:999px;border:1px solid;white-space:nowrap}
.chip-red{background:var(--red-dim);color:var(--red-t);border-color:var(--red-b)}
.chip-green{background:var(--green-dim);color:var(--green-t);border-color:var(--green-b)}
.chip-blue{background:var(--blue-dim);color:var(--blue-t);border-color:var(--blue-b)}
.chip-yellow{background:var(--yellow-dim);color:var(--yellow-t);border-color:var(--yellow-b)}
.chip-purple{background:var(--purple-dim);color:var(--purple-t);border-color:var(--purple-b)}

/* ─── loading / empty ─────────────────────────────────── */
.spinner{width:20px;height:20px;border:2px solid var(--border2);
  border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.spinner-sm{width:12px;height:12px;border:1.5px solid;border-top-color:transparent;
  border-radius:50%;display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--text2);font-size:14px;
  display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-note{font-size:12px;color:var(--text3);max-width:360px;line-height:1.6}
.loading{display:flex;align-items:center;justify-content:center;gap:12px;
  padding:60px 20px;color:var(--text2);font-size:14px}

/* ─── HOME ────────────────────────────────────────────── */
.cta{text-align:center;padding:40px 0 28px}
.cta-desc{color:var(--text2);font-size:14px;margin-bottom:28px}
.rec-btn{position:relative;width:84px;height:84px;border-radius:50%;background:var(--red-dim);
  border:1px solid var(--red-b);color:var(--red);transition:transform .15s,box-shadow .15s}
.rec-btn:hover{transform:scale(1.07);box-shadow:0 0 0 8px var(--red-dim)}
.rec-btn:active{transform:scale(.96)}
.rec-btn-ring{position:absolute;inset:-9px;border-radius:50%;
  border:2px solid var(--red-b);opacity:.4;pointer-events:none}
.cta-label{margin-top:13px;font-weight:600;font-size:15px}
.cta-hint{font-size:12px;color:var(--yellow-t);margin-top:5px}

.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);
  padding:22px;box-shadow:var(--shadow);text-align:left;max-width:440px;margin:0 auto 16px}
.form-label{display:block;font-size:13px;font-weight:500;margin-bottom:8px}
.opt{color:var(--text3);font-weight:400}
.form-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.form-hint{font-size:12px;color:var(--text3);margin-top:10px;line-height:1.55}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:26px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px}
.stat-lbl{font-size:12px;color:var(--text2);margin-bottom:5px}
.stat-val{font-size:24px;font-weight:700;letter-spacing:-.03em}

.section-lbl{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:10px}

.meet-card{width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:14px 16px;margin-bottom:8px;transition:border-color .12s,box-shadow .12s}
.meet-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.meet-card-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:5px}
.meet-card-title{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.meet-card-dur{font-family:var(--mono);font-size:12px;color:var(--text2);flex-shrink:0}
.meet-card-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);flex-wrap:wrap}
.meet-card-preview{font-size:13px;color:var(--text3);margin-top:7px;line-height:1.5;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}

/* ─── RECORDING ───────────────────────────────────────── */
.rec-view{flex:1;display:flex;flex-direction:column;overflow:hidden}
.rec-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.rec-bar-left{min-width:0;flex:1}
.rec-title{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.rec-bar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.meter{display:flex;align-items:center;gap:2px}
.mbar{width:3px;border-radius:3px;background:var(--border2);transition:background .07s}
.mbar.on{background:var(--red)}
.rec-time{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--red);min-width:64px;text-align:right}
.rec-time.paused{color:var(--yellow)}
.stop-btn{display:flex;align-items:center;gap:7px}
.stop-sq{width:11px;height:11px;background:var(--red);border-radius:2px;flex-shrink:0}
.rec-stats{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text2);
  padding:8px 20px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#eng-status{font-size:11px;font-weight:600;font-family:var(--mono);transition:color .3s}
.rec-stat{display:flex;align-items:center;gap:5px}
.rec-stat strong{color:var(--text);font-weight:600}

/* ─── TRANSCRIPT AREA ─────────────────────────────────── */
.transcript-scroll{flex:1;overflow-y:auto;padding:24px 20px;max-width:var(--mw);
  margin:0 auto;width:100%;box-sizing:border-box}

.t-empty{display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;padding:80px 20px;text-align:center}
.t-empty-icon{width:56px;height:56px;border-radius:50%;border:2px solid var(--red-b);
  display:flex;align-items:center;justify-content:center;animation:pulse 2.2s ease-in-out infinite}
.t-empty-icon.paused{border-color:var(--yellow-b);animation:none}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.14);opacity:.3}}
.t-empty-title{font-size:16px;font-weight:600;color:var(--text)}
.t-empty-sub{font-size:13px;color:var(--text2);max-width:340px;line-height:1.6}

.t-line{display:flex;gap:16px;margin-bottom:22px;animation:fadein .22s ease}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.t-ts{font-family:var(--mono);font-size:11px;color:var(--text3);padding-top:4px;
  min-width:72px;flex-shrink:0;line-height:1}
.t-body{flex:1}
.t-speaker{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.03em;
  text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.t-text{font-size:17px;line-height:1.65;color:var(--text);font-weight:400}
.t-line.interim .t-text{color:var(--text3);font-style:italic;font-size:16px}
.conf-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.conf-dot.high{background:var(--green)}
.conf-dot.med{background:var(--yellow)}
.conf-dot.low{background:var(--red)}

/* ─── AI PANEL ────────────────────────────────────────── */
.ai-panel{background:var(--purple-dim);border:1px solid var(--purple-b);
  border-radius:var(--r-lg);padding:18px;margin-bottom:22px}
.ai-panel-hdr{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.ai-panel-title{font-size:14px;font-weight:600;color:var(--purple-t);display:flex;align-items:center;gap:7px}
.ai-summary{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:14px}
.ai-lists{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ai-list-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
.ai-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.ai-list li{font-size:13px;line-height:1.5;color:var(--text);display:flex;gap:7px;align-items:flex-start}
.ai-list li::before{content:'→';color:var(--purple-t);flex-shrink:0;font-weight:600;font-size:11px;margin-top:2px}
.ai-loading{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--purple-t);padding:8px 0}
.sentiment-chip{font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px}

/* ─── MEETINGS LIST ───────────────────────────────────── */
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.025em}
.count-badge{font-size:12px;color:var(--text2);background:var(--surface2);
  border:1px solid var(--border);border-radius:999px;padding:1px 9px}
.search-wrap{position:relative;display:flex;align-items:center;margin-bottom:18px;
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:0 14px}
.search-wrap:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim)}
.search-ico{font-size:14px;color:var(--text3);flex-shrink:0}
.search-inp{border:none;box-shadow:none;padding:9px 10px;flex:1;background:transparent}
.search-inp:focus{border:none;box-shadow:none}
.search-x{background:none;border:none;color:var(--text3);font-size:20px;line-height:1;cursor:pointer;padding:0 4px}
.search-x:hover{color:var(--text)}

.meet-row{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden;margin-bottom:8px;transition:border-color .12s}
.meet-row:hover{border-color:var(--border2)}
.meet-row-main{flex:1;text-align:left;background:none;border:none;padding:14px 16px}
.meet-row-top{display:flex;justify-content:space-between;gap:12px;margin-bottom:5px}
.meet-row-title{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.meet-row-dur{font-family:var(--mono);font-size:12px;color:var(--text2);flex-shrink:0}
.meet-row-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);flex-wrap:wrap}
.meet-row-preview{font-size:12px;color:var(--text3);margin-top:6px;line-height:1.5;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.meet-row-del{display:flex;align-items:center;padding:0 10px;border-left:1px solid var(--border)}
.confirm-del{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);padding:0 4px;white-space:nowrap}

/* ─── DETAIL ──────────────────────────────────────────── */
.detail-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap}
.back-btn{background:none;border:none;color:var(--blue);font-size:14px;padding:0}
.back-btn:hover{text-decoration:underline}
.detail-acts{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.confirm-del-inline{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.detail-title{font-size:24px;font-weight:700;letter-spacing:-.03em;margin-bottom:10px;line-height:1.25}
.detail-chips{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--text2);margin-bottom:20px}
.audio-wrap{margin-bottom:22px}
.audio-lbl{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:7px}
audio{width:100%;height:38px;border-radius:var(--r)}
.detail-search{margin-bottom:22px}
.t-body-wrap{display:flex;flex-direction:column}

/* ─── SETTINGS ────────────────────────────────────────── */
.mode-banner{padding:13px 16px;border-radius:var(--r-lg);font-size:13px;border:1px solid var(--border);
  background:var(--surface2);margin-bottom:26px;color:var(--text2)}
.mode-banner.cloud{background:var(--green-dim);border-color:var(--green-b);color:var(--green-t)}
.settings-sec{margin-bottom:34px}
.settings-sec-title{font-size:16px;font-weight:600;margin-bottom:8px}
.settings-desc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:16px}
.steps{font-size:13px;color:var(--text2);line-height:1.9;padding-left:20px;margin-bottom:18px}
.steps code{font-family:var(--mono);font-size:12px;background:var(--surface2);
  border:1px solid var(--border);padding:1px 5px;border-radius:4px;color:var(--text)}
.fields{display:flex;flex-direction:column;gap:14px;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:13px;font-weight:500}
.field-hint{font-size:11px;color:var(--text3);line-height:1.5;margin-top:2px}
.settings-btns{display:flex;gap:8px;flex-wrap:wrap}
.tech-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tech-tag{font-size:11px;background:var(--surface2);border:1px solid var(--border);

<body>
<div id="app"></div>

<script>
// ════════════════════════════════════════════════════════
//  VoiceLog v2 — Enhanced Meeting Transcriber
//  GitHub Pages compatible — single file, zero build tools
// ════════════════════════════════════════════════════════

/* ─── Speaker color system ──────────────────────────────*/
// Assign a consistent color class to each unique speaker name
const _speakerColorCache = {};
let _speakerColorIdx = 0;
function speakerColorClass(name) {
  if (!_speakerColorCache[name]) {
    _speakerColorCache[name] = 'spk-' + (_speakerColorIdx++ % 6);
  }
  return _speakerColorCache[name];
}
function resetSpeakerColors() {
  Object.keys(_speakerColorCache).forEach(k => delete _speakerColorCache[k]);
  _speakerColorIdx = 0;
}

/* ─── Word frequency analysis ───────────────────────────*/
const STOP_WORDS = new Set(['the','a','an','and','or','but','in','on','at','to','for','of','with',
  'by','from','is','was','are','were','be','been','have','has','had','do','did','will','would',
  'could','should','may','might','i','you','he','she','it','we','they','this','that','these',
  'those','my','your','his','her','its','our','their','what','which','who','when','where','how',
  'so','if','then','than','as','up','out','about','into','through','after','before','just','also',
  'not','no','yes','ok','yeah','um','uh','like','know','going','get','got','need','want','think',
  'said','say','says','can','all','more','some','there','here','its','very','well','right','now',
  'because','really','actually','basically','literally','kind']);

function topWords(transcript, n = 10) {
  const freq = {};
  (transcript || []).forEach(l => {
    (l.text.toLowerCase().match(/\b[a-z]{4,}\b/g) || [])
      .filter(w => !STOP_WORDS.has(w))
      .forEach(w => { freq[w] = (freq[w]||0) + 1; });
  });
  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,n);
}

/* ─── Tags ──────────────────────────────────────────────*/
const TAGS_KEY = 'voicelog_tags_v1';
function getTags(id) {
  try { const t = JSON.parse(localStorage.getItem(TAGS_KEY)||'{}'); return t[String(id)] || []; } catch { return []; }
}
function saveTags(id, tags) {
  try { const t = JSON.parse(localStorage.getItem(TAGS_KEY)||'{}'); t[String(id)] = tags; localStorage.setItem(TAGS_KEY, JSON.stringify(t)); } catch {}
}
function addTag(id, tag) {
  const t = getTags(id); if (!tag || t.includes(tag)) return;
  saveTags(id, [...t, tag]); render();
}
function removeTag(id, tag) {
  saveTags(id, getTags(id).filter(t=>t!==tag)); render();
}
function promptTag(id) {
  const tag = prompt('Add tag (e.g. "weekly sync", "interview", "1:1"):');
  if (tag?.trim()) addTag(id, tag.trim().toLowerCase());
}

/* ─── Stars / bookmarks ─────────────────────────────────*/
const STARS_KEY = 'voicelog_stars_v1';
function getStars(meetingId) {
  try { const s = JSON.parse(localStorage.getItem(STARS_KEY)||'{}'); return new Set(s[String(meetingId)] || []); } catch { return new Set(); }
}
function toggleStar(meetingId, lineIdx) {
  try {
    const s = JSON.parse(localStorage.getItem(STARS_KEY)||'{}');
    const key = String(meetingId);
    const set = new Set(s[key] || []);
    set.has(lineIdx) ? set.delete(lineIdx) : set.add(lineIdx);
    s[key] = [...set]; localStorage.setItem(STARS_KEY, JSON.stringify(s));
  } catch {}
  // Re-render just the star button
  const btn = document.getElementById(`star-${lineIdx}`);
  if (btn) {
    const starred = getStars(meetingId).has(lineIdx);
    btn.classList.toggle('starred', starred);
    btn.title = starred ? 'Unstar line' : 'Star line';
    btn.textContent = starred ? '★' : '☆';
    const row = document.getElementById(`tl-detail-${lineIdx}`);
    if (row) row.classList.toggle('starred', starred);
  }
}

/* ─── Notes during recording ────────────────────────────*/
// Notes are stored in S.notes[] during recording and saved with the meeting
// Format: {id, text, ts, recTime}
const NOTES_KEY = 'voicelog_notes_v1';
function getMeetingNotes(id) {
  try { const n = JSON.parse(localStorage.getItem(NOTES_KEY)||'{}'); return n[String(id)] || []; } catch { return []; }
}
function saveMeetingNotes(id, notes) {
  try { const n = JSON.parse(localStorage.getItem(NOTES_KEY)||'{}'); n[String(id)] = notes; localStorage.setItem(NOTES_KEY, JSON.stringify(n)); } catch {}
}
function addNote(text) {
  if (!text?.trim()) return;
  const note = {id: Date.now(), text: text.trim(), ts: fmtTs(), recTime: fmt(S.recTime)};
  S.notes = S.notes || [];
  S.notes.push(note);
  // Render into the notes list
  const list = el('notes-list-area'); if (!list) return;
  const div = document.createElement('div');
  div.className = 'note-item'; div.id = 'note-'+note.id;
  div.innerHTML = `<span class="note-ts">${esc(note.recTime)}</span>
    <span class="note-text">${esc(note.text)}</span>
    <button class="note-del" onclick="deleteNote(${note.id})" title="Remove">×</button>`;
  list.appendChild(div);
}
function deleteNote(id) {
  S.notes = (S.notes||[]).filter(n=>n.id!==id);
  const el2 = document.getElementById('note-'+id); if (el2) el2.remove();
}

/* ─── Export dropdown state ─────────────────────────────*/
let _exportMenuOpen = false;
function toggleExportMenu(e) {
  e?.stopPropagation();
  _exportMenuOpen = !_exportMenuOpen;
  const menu = el('export-menu');
  if (menu) { menu.style.display = _exportMenuOpen ? 'block' : 'none'; }
}
document.addEventListener('click', () => {
  if (_exportMenuOpen) { _exportMenuOpen = false; const m = el('export-menu'); if (m) m.style.display='none'; }
});


const CFG = {
  get lang()     { try { return localStorage.getItem('voicelog_lang') || 'en-US'; } catch { return 'en-US'; } },
  set lang(v)    { localStorage.setItem('voicelog_lang', v); },
  get conf()     { try { return parseFloat(localStorage.getItem('voicelog_conf') || '0'); } catch { return 0; } },
  set conf(v)    { localStorage.setItem('voicelog_conf', String(v)); },
  get aiKey()    { try { return localStorage.getItem('voicelog_ai_key') || ''; } catch { return ''; } },
  set aiKey(v)   { localStorage.setItem('voicelog_ai_key', v); },
  get autoSum()  { try { return localStorage.getItem('voicelog_auto_sum') !== 'false'; } catch { return true; } },
  set autoSum(v) { localStorage.setItem('voicelog_auto_sum', String(v)); },
};

const SUMMARIES_KEY = 'voicelog_summaries_v1';
function getSummary(id) {
  try { const s = JSON.parse(localStorage.getItem(SUMMARIES_KEY)||'{}'); return s[String(id)]||null; } catch { return null; }
}
function saveSummaryLocal(id, data) {
  try { const s=JSON.parse(localStorage.getItem(SUMMARIES_KEY)||'{}'); s[String(id)]=data; localStorage.setItem(SUMMARIES_KEY, JSON.stringify(s)); } catch {}
}
function deleteSummaryLocal(id) {
  try { const s=JSON.parse(localStorage.getItem(SUMMARIES_KEY)||'{}'); delete s[String(id)]; localStorage.setItem(SUMMARIES_KEY, JSON.stringify(s)); } catch {}
}

/* ─── State ─────────────────────────────────────────────*/
const S = {
  tab: 'home',
  meetings: [],
  selected: null,
  loading: true,
  saving: false,
  isRec: false,
  isPaused: false,
  recTime: 0,
  lines: [],
  interim: '',
  audioLevel: 0,
  sources: {mic:false, sys:false},
  meetTitle: '',
  mode: 'local',
  error: '',
  aiWorking: false,     // AI generation in progress
  aiError: '',
  // recorder internals
  _recognition: null,
  _recorder: null,
  _chunks: [],
  _timer: null,
  _raf: null,
  _actx: null,
  _analyser: null,
  _analyserBuf: null,
  _timerStart: 0,
  _timerOffset: 0,
  _linesSnap: [],
  _timeSnap: 0,
  _titleSnap: '',
  _srcSnap: {mic:false, sys:false},
  // Speaker diarization
  _speakerIdx: 0,
  _lastSpeechTs: 0,
  _speakerGap: 4000,   // ms silence before assuming new speaker
  _speakerNames: ['You','Speaker 2','Speaker 3','Speaker 4'],
  // Live notes
  notes: [],
  // Engine status
  _engStatus: '',
};

/* ─── Helpers ───────────────────────────────────────────*/
const fmt = s => {
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return h>0 ? `${h}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
};
const pad = n => String(n).padStart(2,'0');
const fmtDate = d => {
  const dt = d instanceof Date ? d : new Date(d);
  return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})
    +' · '+dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
};
const fmtRel = d => {
  const dt = d instanceof Date ? d : new Date(d);
  const diff = Date.now()-dt.getTime();
  const m=Math.floor(diff/60000), h=Math.floor(diff/3600000), days=Math.floor(diff/86400000);
  if(m<1) return 'Just now';
  if(m<60) return `${m}m ago`;
  if(h<24) return `${h}h ago`;
  if(days<7) return `${days}d ago`;
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
};
const fmtTs = () => new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const el = id => document.getElementById(id);
const hasSpeech = !!(window.SpeechRecognition||window.webkitSpeechRecognition);

/* ─── Text post-processor ───────────────────────────────
 * Fixes common speech-to-text artifacts before storing.
 * Runs on every final result — zero latency, zero cost.
 * ─────────────────────────────────────────────────────── */
function postProcess(text) {
  if (!text) return text;
  // Capitalize first character
  text = text.charAt(0).toUpperCase() + text.slice(1);
  // Fix lone "i" → "I"
  text = text.replace(/\bi\b/g, 'I');
  // Fix common contractions that arrive lowercase from STT
  text = text.replace(/\bi'm\b/gi, "I'm");
  text = text.replace(/\bi've\b/gi, "I've");
  text = text.replace(/\bi'll\b/gi, "I'll");
  text = text.replace(/\bi'd\b/gi, "I'd");
  text = text.replace(/\bi'd\b/gi, "I'd");
  text = text.replace(/\bdon't\b/gi, "don't");
  text = text.replace(/\bdoesn't\b/gi, "doesn't");
  text = text.replace(/\bwon't\b/gi, "won't");
  text = text.replace(/\bcan't\b/gi, "can't");
  // Remove obvious repetition artifacts (word word word → word)
  text = text.replace(/\b(\w{3,})( \1){2,}/gi, '$1');
  // Add trailing period if text ends with a word char
  if (text && /\w$/.test(text) && text.length > 15) text += '.';
  return text.trim();
}

/* ─── AI helpers ────────────────────────────────────────*/
async function callAI(prompt, maxTokens = 600) {
  const key = CFG.aiKey;
  if (!key) throw new Error('No API key. Add your Anthropic key in Settings.');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }],
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({error:{message:`HTTP ${res.status}`}}));
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  const text = data.content?.find(c => c.type === 'text')?.text || '';
  return text.replace(/```json|```/g, '').trim();
}

async function generateAISummary(meeting) {
  const lines = meeting.transcript || [];
  if (!lines.length) return null;
  const transcript = lines.map(l => `[${l.ts||''}] ${l.speaker}: ${l.text}`).join('\n');
  const prompt = `Analyze this meeting transcript. Respond ONLY with valid JSON — no preamble, no markdown.

Transcript (${lines.length} lines, ${meeting.duration}s, ${meeting.wordCount} words):
${transcript}

JSON schema:
{"summary":"2-3 sentence overview of what was discussed","keyPoints":["concise point"],"actionItems":["concrete next step"],"sentiment":"positive|neutral|mixed|tense"}

Rules: keyPoints max 5 items, actionItems max 5 items. If nothing to list, use empty array.`;
  const raw = await callAI(prompt, 700);
  return JSON.parse(raw);
}

async function cleanTranscriptWithAI(meeting) {
  const lines = meeting.transcript || [];
  if (!lines.length) return null;
  const prompt = `Fix this speech-to-text transcript. For each line: correct misheard words, fix grammar, add punctuation, remove filler words (um, uh, like, you know). Keep original meaning and speaker.

Lines (return ALL of them, same count):
${JSON.stringify(lines.map(l => ({id: l.id, text: l.text})))}

Respond ONLY with a JSON array: [{"id":"...","text":"corrected text"}, ...]
No preamble, no markdown.`;
  const raw = await callAI(prompt, lines.length * 60 + 200);
  return JSON.parse(raw);
}

/* ─── Local Storage DB ──────────────────────────────────*/
const LOCAL_KEY = 'voicelog_v1';
const SB_CFG_KEY = 'voicelog_sb_config';

function localLoad() {
  try { return JSON.parse(localStorage.getItem(LOCAL_KEY)||'[]'); } catch { return []; }
}
function localSave(arr) { localStorage.setItem(LOCAL_KEY, JSON.stringify(arr)); }
function sbCfg() {
  try { return JSON.parse(localStorage.getItem(SB_CFG_KEY)||'{}'); } catch { return {}; }
}
function sbClient() {
  const {url,key} = sbCfg();
  if(!url||!key||!window.supabase) return null;
  return window.supabase.createClient(url,key);
}
function isCloud() { const {url,key}=sbCfg(); return !!(url&&key); }

/* ─── DB Layer ──────────────────────────────────────────*/
async function dbLoad() {
  S.loading = true; render();
  try {
    if(isCloud()) {
      const sb = sbClient();
      const {data:rows, error:e} = await sb.from('meetings').select('*').order('date',{ascending:false});
      if(e) throw e;
      if(!rows?.length){ S.meetings=[]; S.loading=false; S.mode='cloud'; render(); return; }
      const ids = rows.map(r=>r.id);
      const {data:lines, error:le} = await sb.from('transcript_lines').select('*').in('meeting_id',ids).order('line_order',{ascending:true});
      if(le) throw le;
      const map={};
      (lines||[]).forEach(l=>{ map[l.meeting_id]=map[l.meeting_id]||[]; map[l.meeting_id].push(l); });
      S.meetings = rows.map(r=>({
        id:r.id, title:r.title, date:new Date(r.date), duration:r.duration,
        wordCount:r.word_count, hasMic:r.has_mic, hasSystem:r.has_system, audioUrl:r.audio_url,
        transcript:(map[r.id]||[]).map(l=>({id:l.id,text:l.text,speaker:l.speaker,ts:l.ts,confidence:l.confidence||0}))
      }));
      S.mode='cloud';
    } else {
      S.meetings = localLoad().map(m=>({...m, date:new Date(m.date)}));
      S.mode='local';
    }
  } catch(err) { S.error='Failed to load meetings: '+err.message; }
  S.loading=false; render();
}

async function dbSave(meeting, audioBlob) {
  if(isCloud()) {
    const sb = sbClient();
    let audioUrl=null;
    if(audioBlob) {
      const fn = `${Date.now()}.webm`;
      const {data:up, error:ue} = await sb.storage.from('recordings').upload(fn, audioBlob, {contentType:'audio/webm'});
      if(!ue&&up) {
        const {data:{publicUrl}} = sb.storage.from('recordings').getPublicUrl(up.path);
        audioUrl = publicUrl;
      }
    }
    const {data:row, error:me} = await sb.from('meetings').insert({
      title:meeting.title, date:meeting.date instanceof Date?meeting.date.toISOString():meeting.date,
      duration:meeting.duration, word_count:meeting.wordCount,
      has_mic:meeting.hasMic, has_system:meeting.hasSystem, audio_url:audioUrl
    }).select().single();
    if(me) throw me;
    if(meeting.transcript?.length) {
      const lrows = meeting.transcript.map((l,i)=>({meeting_id:row.id,text:l.text,speaker:l.speaker,ts:l.ts,line_order:i,confidence:l.confidence||0}));
      await sb.from('transcript_lines').insert(lrows);
    }
    return {...meeting, id:row.id, audioUrl};
  }
  const stored = {...meeting, date:meeting.date instanceof Date?meeting.date.toISOString():meeting.date, audioUrl:meeting.audioUrl||null};
  const all = localLoad();
  all.unshift(stored);
  localSave(all);
  return {...stored, date:new Date(stored.date)};
}

async function dbDelete(id) {
  if(isCloud()) {
    const sb=sbClient();
    const {error:e} = await sb.from('meetings').delete().eq('id',id);
    if(e) throw e;
  } else {
    localSave(localLoad().filter(m=>String(m.id)!==String(id)));
  }
  deleteSummaryLocal(id);
}

async function dbSearch(q) {
  const lq = q.toLowerCase().trim();
  if(!lq) return S.meetings;
  if(isCloud()) {
    const sb=sbClient();
    const {data:th}=await sb.from('meetings').select('id').ilike('title',`%${lq}%`);
    const {data:lh}=await sb.from('transcript_lines').select('meeting_id').ilike('text',`%${lq}%`);
    const ids=new Set([...(th||[]).map(r=>r.id),...(lh||[]).map(r=>r.meeting_id)]);
    return S.meetings.filter(m=>ids.has(m.id));
  }
  return S.meetings.filter(m=>
    m.title.toLowerCase().includes(lq)||
    m.transcript?.some(l=>l.text.toLowerCase().includes(lq))
  );
}

/* ─── Enhanced Continuous Recognizer ────────────────────
 *  v2 improvements over v1:
 *  · maxAlternatives: 3 — picks highest-confidence alternative
 *  · Configurable confidence threshold — skips garbled results
 *  · Language param — supports 10+ languages
 *  · Pause/resume without losing the instance lifecycle
 *  · Same three-layer restart defence as v1
 * ─────────────────────────────────────────────────────── */
const Recognizer = (() => {
  /*
   * Bulletproof continuous Speech Recognition
   * ──────────────────────────────────────────
   * Root causes of dropped words / 60 s stops:
   *
   *  1. Chrome hard-kills any session at 60 s.
   *     FIX → pre-emptive graceful stop() at 50 s.
   *          stop() finalises in-flight results; onend fires;
   *          we restart within 60 ms. Zero words lost.
   *
   *  2. Chrome stops after ~7 s of silence (no-speech).
   *     FIX → let onend restart automatically. The restart
   *          takes ~60 ms which is imperceptible.
   *
   *  3. Words in the "interim" buffer are lost when a session
   *     ends before they become "final".
   *     FIX → _pendingInterim: save current interim on session
   *          end, prepend it to the first result of the next
   *          session so nothing is swallowed.
   *
   *  4. Re-using a stopped SpeechRecognition instance throws
   *     InvalidStateError in Chrome.
   *     FIX → always create a fresh instance in _spawn().
   *
   *  5. Rapid back-to-back starts can race.
   *     FIX → _restarting flag gates _spawn(); watchdog checks
   *          every 1 s and force-spawns if stalled.
   */

  let _alive          = false;
  let _running        = false;
  let _restarting     = false;
  let _instance       = null;
  let _watchdog       = null;
  let _preemptTimer   = null;   // fires at 50 s to pre-empt Chrome's 60 s kill
  let _onResult       = null;
  let _onStatus       = null;   // callback('live'|'restarting'|'stopped')
  let _lang           = 'en-US';
  let _confThresh     = 0;
  let _pendingInterim = '';     // interim text saved across session boundaries
  let _sessionStart   = 0;     // timestamp when current session started

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  function _notify(status) {
    if (_onStatus) _onStatus(status);
    // Update the live engine status badge without a full re-render
    const badge = document.getElementById('eng-status');
    if (badge) {
      const map = {
        live:        ['🟢', 'var(--green-t)',  'Live'],
        restarting:  ['🔄', 'var(--yellow-t)', 'Restarting…'],
        stopped:     ['⚫', 'var(--text3)',     'Stopped'],
        paused:      ['⏸',  'var(--yellow-t)', 'Paused'],
      };
      const [icon, color, label] = map[status] || ['', '', status];
      badge.style.color = color;
      badge.textContent = icon + ' ' + label;
    }
  }

  function _spawn() {
    if (!_alive || _restarting) return;
    _restarting = true;
    _notify('restarting');

    const r = new SR();
    _instance = r;
    r.continuous      = true;
    r.interimResults  = true;
    r.lang            = _lang;
    r.maxAlternatives = 3;

    r.onstart = () => {
      _running      = true;
      _restarting   = false;
      _sessionStart = Date.now();
      _notify('live');

      // ── Pre-emptive restart at 50 s ────────────────────
      // We call r.stop() — not r.abort() — so Chrome finalises
      // any in-progress recognition before ending the session.
      // onend fires normally and _spawn() restarts within 60 ms.
      clearTimeout(_preemptTimer);
      _preemptTimer = setTimeout(() => {
        if (_alive && _running) {
          _running = false;   // suppress watchdog during planned stop
          try { r.stop(); } catch {}
        }
      }, 50_000);
    };

    r.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          // Pick alternative with highest confidence
          let best = e.results[i][0];
          for (let j = 1; j < e.results[i].length; j++) {
            if ((e.results[i][j].confidence || 0) > (best.confidence || 0)) {
              best = e.results[i][j];
            }
          }
          const conf = best.confidence || 0;
          if (_confThresh > 0 && conf > 0 && conf < _confThresh) continue;

          // Prepend any interim text that survived the last restart
          const raw = (_pendingInterim ? _pendingInterim + ' ' : '') + best.transcript.trim();
          _pendingInterim = '';

          const text = postProcess(raw);
          if (text && _onResult) _onResult(text, true, conf);
        } else {
          interim += e.results[i][0].transcript;
        }
      }
      if (_onResult) _onResult(interim, false, 0);
    };

    r.onerror = (e) => {
      // not-allowed → user denied mic; stop permanently
      if (e.error === 'not-allowed') {
        _alive = false;
        _notify('stopped');
        return;
      }
      // no-speech → silence timeout; onend will restart
      // aborted   → we called abort() intentionally
      // network   → transient; onend will restart
      // All others: let onend handle it
      _running = false;
    };

    r.onend = () => {
      clearTimeout(_preemptTimer);

      // ── Save interim buffer across session boundary ─────
      // Any words being dictated when the session ends will be
      // in S.interim. Save them so the next session can prepend
      // them to its first final result.
      if (S.interim && S.interim.trim()) {
        _pendingInterim = (_pendingInterim + ' ' + S.interim).trim();
        // Keep showing it as interim (greyed) in the UI
      }

      _running    = false;
      _restarting = false;

      if (!_alive) {
        _notify('stopped');
        return;
      }

      // Restart. Use 60 ms gap — enough for Chrome to release
      // the audio capture lock cleanly without losing words.
      setTimeout(_spawn, 60);
    };

    try {
      r.start();
    } catch (err) {
      // start() can throw if called too quickly after a stop
      _restarting = false;
      _running    = false;
      if (_alive) setTimeout(_spawn, 300);
    }
  }

  function _startWatchdog() {
    // Safety net: if we're supposed to be running but aren't,
    // force a new spawn. Fires every 1 s.
    clearInterval(_watchdog);
    _watchdog = setInterval(() => {
      if (_alive && !_running && !_restarting) {
        console.warn('[VoiceLog] Recognizer stalled — forcing restart');
        _spawn();
      }
    }, 1000);
  }

  return {
    start(onResult, onStatus, lang, confThresh) {
      if (!SR) return false;
      _alive = true; _running = false; _restarting = false;
      _pendingInterim = '';
      _onResult   = onResult;
      _onStatus   = onStatus || null;
      _lang       = lang || 'en-US';
      _confThresh = confThresh || 0;
      _spawn();
      _startWatchdog();
      return true;
    },

    pause() {
      _alive = false;
      clearTimeout(_preemptTimer);
      clearInterval(_watchdog); _watchdog = null;
      // Use abort() on pause — we don't want partial results
      try { _instance?.abort(); } catch {}
      _notify('paused');
    },

    resume(onResult, lang, confThresh) {
      _alive      = true;
      _running    = false;
      _restarting = false;
      _pendingInterim = '';
      if (onResult)             _onResult   = onResult;
      if (lang)                 _lang       = lang;
      if (confThresh != null)   _confThresh = confThresh;
      _spawn();
      _startWatchdog();
    },

    stop() {
      _alive      = false;
      _running    = false;
      _restarting = false;
      _pendingInterim = '';
      clearTimeout(_preemptTimer);
      clearInterval(_watchdog); _watchdog = null;
      try { _instance?.abort(); } catch {}
      _instance = null;
      _notify('stopped');
    },
  };
})();

/* ─── Recording Engine ──────────────────────────────────*/
function _onEngineStatus(status) {
  // Lightweight status update — no full re-render needed
  S._engStatus = status;
  const badge = document.getElementById('eng-status');
  if (!badge) return;
  const map = {
    live:       ['🟢 Live',       'var(--green-t)'],
    restarting: ['🔄 Restarting…','var(--yellow-t)'],
    paused:     ['⏸ Paused',     'var(--yellow-t)'],
    stopped:    ['⚫ Stopped',    'var(--text3)'],
  };
  const [label, color] = map[status] || [status, 'var(--text2)'];
  badge.textContent = label;
  badge.style.color = color;
}

function _handleRecResult(text, isFinal, confidence) {
  if (isFinal) {
    // Speaker diarization — rotate when silence gap exceeded
    const now = Date.now();
    if (S._lastSpeechTs && (now - S._lastSpeechTs) > S._speakerGap) {
      S._speakerIdx = (S._speakerIdx + 1) % S._speakerNames.length;
    }
    S._lastSpeechTs = now;
    const speaker = S._speakerNames[S._speakerIdx];

    const line = {id: Date.now() + Math.random(), text, speaker, ts: fmtTs(), confidence};
    S.lines.push(line);
    S._linesSnap = [...S.lines];
    S.interim = '';
    appendTranscriptLine(line);
    removeInterim();

    // Update live counters without re-rendering
    const wce = el('live-words');
    if (wce) wce.textContent = S.lines.reduce((a,l)=>a+l.text.split(/\s+/).length, 0);
    const lce = el('live-lines');
    if (lce) lce.textContent = S.lines.length;
  } else {
    S.interim = text;
    updateInterim(text);
  }
}

function _startMeter() {
  if (!S._analyser) return;
  const tick = () => {
    S._analyser.getByteFrequencyData(S._analyserBuf);
    S.audioLevel = Math.min(1, S._analyserBuf.reduce((a,v)=>a+v,0) / S._analyserBuf.length / 45);
    document.querySelectorAll('.mbar').forEach((b,i) => b.classList.toggle('on', S.audioLevel * 20 > i));
    S._raf = requestAnimationFrame(tick);
  };
  tick();
}

function _startTimer() {
  S._timerStart = Date.now();
  S._timer = setInterval(() => {
    S.recTime   = S._timerOffset + Math.floor((Date.now() - S._timerStart) / 1000);
    S._timeSnap = S.recTime;
    const te = el('rec-timer');  if (te) te.textContent = fmt(S.recTime);
    const he = el('hdr-timer');  if (he) he.textContent = (S.isPaused ? '⏸ ' : 'REC ') + fmt(S.recTime);
  }, 1000);
}

async function startRecording(title) {
  S.error = '';
  S._engStatus = '';

  // ── 1. Microphone (required) ─────────────────────────
  let micStream;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation:   true,
        noiseSuppression:   true,
        autoGainControl:    true,
        channelCount:       1,
        sampleRate:         16000,  // optimal for speech recognition
      },
      video: false,
    });
  } catch {
    S.error = 'Microphone access denied — please allow it and try again.';
    render(); return;
  }

  // ── 2. System / speaker audio (optional) ────────────
  // User must share a tab/window AND tick "Share audio"
  const src = {mic: true, sys: false};
  let sysStream = null;
  try {
    sysStream = await navigator.mediaDevices.getDisplayMedia({
      audio: {
        echoCancellation:  false,
        noiseSuppression:  false,
        autoGainControl:   false,
        sampleRate:        44100,
      },
      video: {width: 1, height: 1, frameRate: 1},  // smallest possible — we only want audio
    });
    if (sysStream.getAudioTracks().length) {
      src.sys = true;
      // If user closes the share prompt, stop recording cleanly
      sysStream.getAudioTracks()[0].onended = () => {
        S.sources.sys = false;
        const chip = document.querySelector('.chip-green');
        if (chip) chip.remove();
      };
    }
  } catch {
    // User cancelled screen share — continue mic-only, no error
  }

  S.sources = src;  S._srcSnap = {...src};

  // ── 3. Web Audio: mix streams + level meter ──────────
  try {
    const ctx  = new AudioContext({sampleRate: 16000});
    S._actx    = ctx;
    const dest = ctx.createMediaStreamDestination();

    // Mic → dest
    const micSrc = ctx.createMediaStreamSource(micStream);

    // Gain nodes so we can balance mic vs system audio
    const micGain = ctx.createGain(); micGain.gain.value = 1.0;
    micSrc.connect(micGain); micGain.connect(dest);

    if (sysStream?.getAudioTracks().length) {
      const sysSrc  = ctx.createMediaStreamSource(sysStream);
      const sysGain = ctx.createGain(); sysGain.gain.value = 0.85;
      sysSrc.connect(sysGain); sysGain.connect(dest);
    }

    // Level meter from mic only
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 64;
    micSrc.connect(analyser);
    S._analyser    = analyser;
    S._analyserBuf = new Uint8Array(analyser.frequencyBinCount);
    _startMeter();

    // MediaRecorder for the saved audio file (uses mixed stream)
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
    const rec = new MediaRecorder(dest.stream, mimeType ? {mimeType} : {});
    S._recorder = rec;
    S._chunks   = [];
    rec.ondataavailable = e => { if (e.data.size > 0) S._chunks.push(e.data); };
    rec.start(500);   // 500 ms chunks — finer granularity than 1 s

  } catch(e) { console.error('[VoiceLog] Audio setup error:', e); }

  // ── 4. Start speech recognition ──────────────────────
  Recognizer.start(_handleRecResult, _onEngineStatus, CFG.lang, CFG.conf);

  // ── 5. Start timer + set state ───────────────────────
  S._timerOffset = 0;
  _startTimer();

  S.meetTitle   = title; S._titleSnap = title;
  S.lines       = [];    S._linesSnap = [];
  S.interim     = '';    S.recTime    = 0;
  S.isRec       = true;  S.isPaused   = false;
  S._speakerIdx = 0;     S._lastSpeechTs = 0;
  S.notes       = [];

  S.tab = 'recording';
  render();
}

function pauseRecording() {
  if (!S.isRec || S.isPaused) return;
  S.isPaused = true;
  Recognizer.pause();
  clearInterval(S._timer);  S._timer = null;
  cancelAnimationFrame(S._raf); S._raf = null;
  S._timerOffset = S.recTime;
  if (S._recorder?.state === 'recording') S._recorder.pause();
  render();
}

function resumeRecording() {
  if (!S.isRec || !S.isPaused) return;
  S.isPaused = false;
  Recognizer.resume(_handleRecResult, CFG.lang, CFG.conf);
  _startTimer();
  _startMeter();
  if (S._recorder?.state === 'paused') S._recorder.resume();
  render();
}

function stopRecording() {
  return new Promise(resolve => {
    Recognizer.stop();
    clearInterval(S._timer);      S._timer = null;
    cancelAnimationFrame(S._raf); S._raf   = null;
    try { S._actx?.close(); } catch {}

    const lines     = [...S._linesSnap];
    const dur       = S._timeSnap;
    const title     = S._titleSnap;
    const src       = {...S._srcSnap};
    const wordCount = lines.reduce((a,l) => a + l.text.split(/\s+/).length, 0);

    S.isRec = false; S.isPaused = false;
    S.audioLevel = 0; S.interim = ''; S.recTime = 0;

    const done = blob => resolve({
      id: Date.now().toString(), title, date: new Date(), duration: dur,
      transcript: lines, audioBlob: blob, hasMic: src.mic, hasSystem: src.sys, wordCount,
    });

    if (S._recorder?.state !== 'inactive') {
      S._recorder.onstop = () =>
        done(S._chunks.length ? new Blob(S._chunks, {type: 'audio/webm'}) : null);
      S._recorder.stop();
    } else {
      done(null);
    }
  });
}

/* ─── Live transcript DOM helpers ───────────────────────*/
function confClass(c) {
  if (!c || c === 0) return '';
  if (c >= 0.85) return 'high';
  if (c >= 0.65) return 'med';
  return 'low';
}

function appendTranscriptLine(line) {
  const area = el('transcript-area'); if (!area) return;
  const empty = area.querySelector('.t-empty'); if (empty) empty.remove();
  const cc = confClass(line.confidence);
  const dotHtml = cc ? `<span class="conf-dot ${cc}" title="Confidence: ${Math.round((line.confidence||0)*100)}%"></span>` : '';
  const spkClass = speakerColorClass(line.speaker);
  const div = document.createElement('div');
  div.className = 't-line'; div.id = 'tl-'+line.id;
  div.innerHTML = `<span class="t-ts">${esc(line.ts)}</span>
  <div class="t-body">
    <div class="t-speaker ${spkClass}">${esc(line.speaker)}${dotHtml}</div>
    <p class="t-text">${esc(line.text)}</p>
  </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  // Update live speaker label if it changed
  const spkLbl = el('live-speaker');
  if (spkLbl && spkLbl.textContent !== line.speaker) {
    spkLbl.textContent = line.speaker;
    spkLbl.className = spkClass;
  }
}

function updateInterim(text) {
  let itm = el('interim-line');
  if (!text) { if (itm) itm.remove(); return; }
  const area = el('transcript-area'); if (!area) return;
  if (!itm) {
    itm = document.createElement('div');
    itm.className = 't-line interim'; itm.id = 'interim-line';
    area.appendChild(itm);
  }
  itm.innerHTML = `<span class="t-ts">…</span>
  <div class="t-body">
    <div class="t-speaker">You</div>
    <p class="t-text">${esc(text)}</p>
  </div>`;
  area.scrollTop = area.scrollHeight;
}

function removeInterim() {
  const itm = el('interim-line'); if (itm) itm.remove();
}

/* ─── Render ────────────────────────────────────────────*/
function render() {
  el('app').innerHTML = buildApp();
  attachEvents();
}

function buildApp() {
  return `
  ${buildHeader()}
  <main class="main">
    ${ S.tab==='home'      ? buildHome()      :
       S.tab==='recording' ? buildRecording() :
       S.tab==='meetings'  ? buildMeetings()  :
       S.tab==='detail'    ? buildDetail()    :
       S.tab==='settings'  ? buildSettings()  : '' }
  </main>`;
}

function buildHeader() {
  const recBadge = S.isRec
    ? `<div class="rec-pill${S.isPaused?' paused':''}">

  <header class="header">
    <button class="logo" onclick="go('home')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

}

function buildHome() {
  const totalSecs  = S.meetings.reduce((a,m)=>a+(m.duration||0),0);

  const err = S.error ? `<div class="alert alert-err">⚠ ${esc(S.error)}</div>` : '';
  const cta = `
  <div class="cta">
    <p class="cta-desc">Record your mic and meeting audio — transcript appears live</p>
    <button class="rec-btn" onclick="showForm()" aria-label="Start recording">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" x2="12" y1="19" y2="22"/>
      </svg>
      <span class="rec-btn-ring"></span>
    </button>
    <p class="cta-label">New recording</p>
    ${!hasSpeech ? '<p class="cta-hint">⚠ Use Chrome / Edge for live transcription</p>' : ''}

  const statsHtml = S.meetings.length>0 ? `
  <div class="stats-grid">
    <div class="stat"><p class="stat-lbl">Meetings</p><p class="stat-val">${S.meetings.length}</p></div>
    <div class="stat"><p class="stat-lbl">Minutes</p><p class="stat-val">${Math.round(totalSecs/60)}</p></div>
    <div class="stat"><p class="stat-lbl">Words</p><p class="stat-val">${totalWords.toLocaleString()}</p></div>
  </div>
  <p class="section-lbl">Recent meetings</p>
  ${S.meetings.slice(0,4).map(m=>{
    const sum = getSummary(m.id);
    return `
  <button class="meet-card" onclick="viewMeeting('${esc(m.id)}')">
    <div class="meet-card-top">
      <span class="meet-card-title">${esc(m.title)}</span>
      <span class="meet-card-dur">${fmt(m.duration)}</span>
    </div>
    <div class="meet-card-meta">
      <span>${fmtRel(m.date)}</span>
      <span>·</span>
      <span>${m.wordCount} words</span>
      ${m.hasSystem?'<span class="chip chip-green">System audio</span>':''}
      ${sum?'<span class="chip chip-purple">✦ AI summary</span>':''}
    </div>
    ${sum ? `<p class="meet-card-preview">${esc(sum.summary)}</p>`
           : m.transcript?.[0] ? `<p class="meet-card-preview">"${esc(m.transcript[0].text)}"</p>` : ''}
  </button>`}).join('')}
  ${S.meetings.length>4 ? `<button class="link-btn" onclick="go('meetings')">View all ${S.meetings.length} meetings →</button>` : ''}
  ` : '';

  const emptyHtml = !S.loading && S.meetings.length===0 && !S.error ? `
  <div class="empty">
    <p>No recordings yet — hit the button above to start your first meeting.</p>
    ${S.mode==='local'?`<p class="empty-note">Meetings are saved in your browser. Open Settings to connect Supabase for cross-device cloud storage.</p>`:''}
  </div>` : '';

  const loadingHtml = S.loading ? `<div class="loading"><div class="spinner"></div> Loading meetings…</div>` : '';

  return `<div class="view"><div class="wrap">${err}${cta}${loadingHtml}${statsHtml}${emptyHtml}</div></div>`;

function buildRecording() {
  // Dynamic animated bars
  const bars = Array.from({length:20}).map((_,i)=>{
    const on = !S.isPaused && S.audioLevel*20>i;
    const h = S.isPaused ? 3 : Math.max(3, Math.round(6 + (i%5)*3.5 + S.audioLevel*14));
    return `<span class="mbar ${on?'on':''}" style="height:${h}px"></span>`;
  }).join('');

  const liveWords = S.lines.reduce((a,l)=>a+l.text.split(/\s+/).length,0);
  const avgConf = S.lines.filter(l=>l.confidence>0).length
    ? Math.round(S.lines.filter(l=>l.confidence>0).reduce((a,l)=>a+l.confidence,0)
        / S.lines.filter(l=>l.confidence>0).length * 100)
    : null;
  const curSpkName = S._speakerNames[S._speakerIdx] || 'You';
  const curSpkClass = speakerColorClass(curSpkName);

  const srcChips = [
    S.sources.mic?'<span class="chip chip-red">🎙 Mic</span>':'',
    S.sources.sys?'<span class="chip chip-green">🖥 System audio</span>':'',
    !hasSpeech?'<span class="chip chip-yellow">⚠ Chrome/Edge needed</span>':'',
    S.isPaused?'<span class="chip chip-yellow">⏸ Paused</span>':'',
  ].filter(Boolean).join('');

  const linesHtml = S.lines.map(l=>{
    const cc = confClass(l.confidence);
    const dot = cc ? `<span class="conf-dot ${cc}" title="Confidence: ${Math.round((l.confidence||0)*100)}%"></span>` : '';
    const spkClass = speakerColorClass(l.speaker);
    return `
  <div class="t-line" id="tl-${l.id}">
    <span class="t-ts">${esc(l.ts)}</span>
    <div class="t-body">
      <div class="t-speaker ${spkClass}">${esc(l.speaker)}${dot}</div>
      <p class="t-text">${esc(l.text)}</p>
    </div>
  </div>`;}).join('');

  const emptyMsg = S.lines.length===0 && !S.interim ? `
  <div class="t-empty">
    <div class="t-empty-icon${S.isPaused?' paused':''}">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      </svg>
    </div>
    <p class="t-empty-title">${S.isPaused ? 'Recording paused' : 'Listening…'}</p>
    <p class="t-empty-sub">${S.isPaused ? 'Press <strong>Resume</strong> or <strong>Ctrl+Space</strong> to continue.' : 'Start speaking — your words appear here in real time.'}</p>
    ${!hasSpeech&&!S.isPaused?`<p class="t-empty-sub" style="color:var(--yellow-t)">Live transcription requires Chrome or Edge.</p>`:''}
  </div>` : '';

  const interimHtml = S.interim && !S.isPaused ? `
  <div class="t-line interim" id="interim-line">
    <span class="t-ts">…</span>
    <div class="t-body">
      <div class="t-speaker ${curSpkClass}">${esc(curSpkName)}</div>
      <p class="t-text">${esc(S.interim)}</p>
    </div>
  </div>` : '';

  const stopLabel = S.saving ? `<span class="spinner-sm"></span> Saving…` : `<span class="stop-sq"></span> Stop`;
  const pauseBtn  = S.isPaused
    ? `<button class="btn btn-yellow btn-sm" onclick="resumeRecording()" title="Ctrl+Space">▶ Resume</button>`
    : `<button class="btn btn-ghost btn-sm" onclick="pauseRecording()" title="Ctrl+Space">⏸ Pause</button>`;

  const notesItems = (S.notes||[]).map(n=>`
    <div class="note-item" id="note-${n.id}">
      <span class="note-ts">${esc(n.recTime)}</span>
      <span class="note-text">${esc(n.text)}</span>
      <button class="note-del" onclick="deleteNote(${n.id})" title="Remove">×</button>
    </div>`).join('');

  return `
  <div class="rec-view">
    <div class="rec-bar">
      <div class="rec-bar-left">
        <div class="rec-title">${esc(S.meetTitle)}</div>
        <div class="rec-chips">${srcChips}</div>
      </div>
      <div class="rec-bar-right">
        <div class="meter">${bars}</div>
        <button class="btn btn-ghost btn-sm" onclick="bumpSpeaker()"
          title="Mark new speaker — Ctrl+Shift+N" style="font-size:11px" ${S.isPaused?'disabled':''}>👤+</button>
        <div class="rec-time${S.isPaused?' paused':''}" id="rec-timer">${fmt(S.recTime)}</div>
        ${pauseBtn}
        <button class="btn btn-red stop-btn btn-sm" onclick="handleStop()" ${S.saving?'disabled':''}>
          ${stopLabel}
        </button>
      </div>
    </div>
    <div class="rec-stats">
      <span class="rec-stat">Lines: <strong id="live-lines">${S.lines.length}</strong></span>
      <span class="rec-stat">Words: <strong id="live-words">${liveWords}</strong></span>
      ${avgConf!==null?`<span class="rec-stat">Confidence: <strong>${avgConf}%</strong></span>`:''}
      <span class="rec-stat">Speaker: <strong id="live-speaker" class="${curSpkClass}">${esc(curSpkName)}</strong></span>
      <span class="rec-stat" style="margin-left:auto"><span id="eng-status" style="color:var(--green-t);font-size:11px">${S._engStatus==='restarting'?'🔄 Restarting…':'🟢 Live'}</span></span>
    </div>
    ${(S.notes||[]).length ? `<div class="notes-list" id="notes-list-area">${notesItems}</div>` : '<div id="notes-list-area" style="display:none"></div>'}
    <div class="transcript-scroll" id="transcript-area">
      ${emptyMsg}${linesHtml}${interimHtml}
    </div>
    <div class="notes-panel">
      <textarea class="notes-inp" id="notes-inp"
        placeholder="📝 Add a timestamped note… (Enter to save, Ctrl+M)"
        rows="1" onkeydown="handleNoteKey(event)"></textarea>
      <button class="btn btn-ghost btn-sm" onclick="submitNote()">+ Note</button>
    </div>
  </div>`;
}

    : S.meetings.map(m=>{
        const sum = getSummary(m.id);
        return `
  <div class="meet-row">
    <button class="meet-row-main" onclick="viewMeeting('${esc(m.id)}')">
      <div class="meet-row-top">
        <span class="meet-row-title">${esc(m.title)}</span>
        <span class="meet-row-dur">${fmt(m.duration)}</span>
      </div>
      <div class="meet-row-meta">
        <span>${fmtDate(m.date)}</span>
        <span>·</span>
        <span>${m.wordCount} words</span>
        ${m.hasSystem?'<span class="chip chip-green">System</span>':''}
        ${m.audioUrl?'<span class="chip chip-blue">▶ Audio</span>':''}
        ${sum?'<span class="chip chip-purple">✦ AI</span>':''}
      </div>
      ${sum ? `<p class="meet-row-preview">${esc(sum.summary)}</p>`

      <button class="icon-btn" onclick="confirmDel(event,'${esc(m.id)}')" title="Delete">🗑</button>
    </div>
  </div>`}).join('');

  return `
  <div class="view"><div class="wrap">
    <div class="page-hdr">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="page-title">Meetings</span>
        <span class="count-badge">${S.meetings.length}</span>
      </div>
      <button class="icon-btn" onclick="dbLoad()" title="Refresh">↻</button>
    </div>
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input class="search-inp" type="search" id="search-input" placeholder="Search meetings and transcripts…"
        oninput="handleSearch(this.value)" />
      <button class="search-x" onclick="clearSearch()" id="search-x" style="display:none">×</button>
    </div>
    <div id="meetings-list">${listHtml}</div>
  </div></div>`;
}

function buildDetail() {
  const m = S.selected;
  if (!m) return '<div class="view"><div class="wrap"><p>Meeting not found.</p></div></div>';

  const summary = getSummary(m.id);
  const tags    = getTags(m.id);
  const stars   = getStars(m.id);
  const notes   = getMeetingNotes(m.id);

  const chips = [
    fmtDate(m.date), '·', fmt(m.duration), '·', m.wordCount+' words',
    m.hasMic    ? '<span class="chip chip-red">🎙 Mic</span>'         : '',
    m.hasSystem ? '<span class="chip chip-green">🖥 System audio</span>' : '',
  ].join(' ');

  const audio = m.audioUrl
    ? `<div class="audio-wrap"><p class="audio-lbl">Recording</p><audio controls src="${esc(m.audioUrl)}"></audio></div>` : '';

  // ── AI panel ──────────────────────────────────────────
  let aiPanelHtml = '';
  if (S.aiWorking) {
    aiPanelHtml = `<div class="ai-panel">
      <div class="ai-loading"><div class="spinner-sm" style="border-color:var(--purple-b);border-top-color:var(--purple-t)"></div> Generating AI summary…</div>
    </div>`;
  } else if (S.aiError) {
    aiPanelHtml = `<div class="alert alert-err" style="margin-bottom:22px">✗ AI error: ${esc(S.aiError)}
      <button class="link-btn" style="margin-left:auto;color:var(--red-t)" onclick="doGenerateSummary()">Retry</button>
    </div>`;
  } else if (summary) {
    const sentimentColor = {positive:'chip-green',neutral:'chip-blue',mixed:'chip-yellow',tense:'chip-red'}[summary.sentiment]||'chip-blue';
    aiPanelHtml = `<div class="ai-panel">
      <div class="ai-panel-hdr">
        <span class="ai-panel-title">✦ AI Summary</span>
        <div style="display:flex;gap:6px;align-items:center">
          ${summary.sentiment?`<span class="chip ${sentimentColor}">${summary.sentiment}</span>`:''}
          <button class="btn btn-ghost btn-xs" onclick="doRegenerateSummary()">↻ Regenerate</button>
          <button class="btn btn-ghost btn-xs" onclick="dismissSummary()">×</button>
        </div>
      </div>
      <p class="ai-summary">${esc(summary.summary)}</p>
      <div class="ai-lists">
        ${summary.keyPoints?.length?`<div><p class="ai-list-title">Key points</p><ul class="ai-list">${summary.keyPoints.map(p=>`<li>${esc(p)}</li>`).join('')}</ul></div>`:''}
        ${summary.actionItems?.length?`<div><p class="ai-list-title">Action items</p><ul class="ai-list">${summary.actionItems.map(a=>`<li>${esc(a)}</li>`).join('')}</ul></div>`:''}
      </div>
    </div>`;
  } else if (CFG.aiKey && m.transcript?.length > 0) {
    aiPanelHtml = `<div style="margin-bottom:22px">
      <button class="btn btn-purple btn-sm" onclick="doGenerateSummary()">✦ Generate AI summary</button>
    </div>`;
  }

  // ── Stats panel ───────────────────────────────────────
  const wpm      = m.duration>0 ? Math.round((m.wordCount/m.duration)*60) : 0;
  const speakers = [...new Set((m.transcript||[]).map(l=>l.speaker))];
  const avgConf  = m.transcript?.filter(l=>l.confidence>0).length
    ? Math.round(m.transcript.filter(l=>l.confidence>0).reduce((a,l)=>a+l.confidence,0)
        / m.transcript.filter(l=>l.confidence>0).length * 100)
    : null;
  const statsPanel = m.transcript?.length ? `
  <div class="stats-panel">
    <p class="stats-panel-title">Session stats</p>
    <div class="stats-panel-grid">
      <div class="stat-mini"><span class="stat-mini-val">${m.transcript.length}</span><span class="stat-mini-lbl">Lines</span></div>
      <div class="stat-mini"><span class="stat-mini-val">${wpm}</span><span class="stat-mini-lbl">Words / min</span></div>
      <div class="stat-mini"><span class="stat-mini-val">${speakers.length}</span><span class="stat-mini-lbl">Speaker${speakers.length!==1?'s':''}</span></div>
      <div class="stat-mini"><span class="stat-mini-val">${avgConf!==null?avgConf+'%':'—'}</span><span class="stat-mini-lbl">Avg. confidence</span></div>
    </div>
  </div>` : '';

  // ── Word frequency chart ──────────────────────────────
  const words = topWords(m.transcript||[]);
  const maxFreq = words[0]?.[1] || 1;
  const wfPanel = words.length ? `
  <div class="wf-panel">
    <p class="wf-title">Top words</p>
    <div class="wf-list">
      ${words.map(([w,c])=>`
      <div class="wf-row">
        <span class="wf-word">${esc(w)}</span>
        <div class="wf-bar-wrap"><div class="wf-bar" style="width:${Math.round(c/maxFreq*100)}%"></div></div>
        <span class="wf-count">${c}</span>
      </div>`).join('')}
    </div>
  </div>` : '';

  // ── Notes from recording ──────────────────────────────
  const notesList = notes.length ? `
  <div style="margin-bottom:22px">
    <p class="section-lbl" style="margin-bottom:8px">📝 Notes from recording</p>
    ${notes.map(n=>`<div class="note-item" style="border-color:var(--border)">
      <span class="note-ts">${esc(n.recTime)}</span>
      <span class="note-text">${esc(n.text)}</span>
    </div>`).join('')}
  </div>` : '';

  // ── Tags ──────────────────────────────────────────────
  const tagsHtml = `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:18px">
    ${tags.map(t=>`<span class="tag">${esc(t)}<button class="tag-x" onclick="removeTag('${esc(m.id)}','${esc(t)}')" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--text3);padding:0 0 0 3px">×</button></span>`).join('')}
    <button class="tag" onclick="promptTag('${esc(m.id)}')" title="Add tag"><span class="tag-add">+ tag</span></button>
  </div>`;

  // ── Search ────────────────────────────────────────────
  const search = m.transcript?.length>3 ? `<div class="detail-search">
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input class="search-inp" type="search" placeholder="Find in transcript…"
        oninput="highlightTranscript(this.value)" id="detail-search" />
      <button class="search-x" onclick="clearDetailSearch()">×</button>
    </div>
  </div>` : '';

  // ── Starred filter ────────────────────────────────────
  const hasStars = stars.size > 0;
  const starFilterBtn = hasStars
    ? `<button class="btn btn-ghost btn-xs" id="star-filter-btn" onclick="toggleStarFilter()" title="Show starred lines only">★ ${stars.size} starred</button>`
    : '';

  // ── Transcript lines ──────────────────────────────────
  const lines = m.transcript?.map((l,idx)=>{
    const cc = confClass(l.confidence);
    const dot = cc ? `<span class="conf-dot ${cc}" title="Confidence: ${Math.round((l.confidence||0)*100)}%"></span>` : '';
    const spkClass = speakerColorClass(l.speaker);
    const isStarred = stars.has(idx);
    return `
  <div class="t-line${isStarred?' starred':''}" id="tl-detail-${idx}">
    <span class="t-ts">${esc(l.ts||l.timestamp||'')}</span>
    <div class="t-body">
      <div class="t-speaker ${spkClass}">
        <span class="speaker-label-${idx}">${esc(l.speaker)}</span>${dot}
        <button class="t-speaker-btn" onclick="editSpeaker(${idx})" title="Rename speaker">✎</button>
        <button class="t-copy-btn" onclick="copyLine(${idx})" title="Copy line">⎘</button>
        <button class="t-star-btn ${isStarred?'starred':''}" id="star-${idx}"
          onclick="toggleStar('${esc(m.id)}',${idx})" title="${isStarred?'Unstar':'Star'} line">${isStarred?'★':'☆'}</button>
      </div>
      <div class="t-text-wrap" onclick="editLine(${idx})">
        <p class="t-text" id="t-text-${idx}" data-raw="${esc(l.text)}">${esc(l.text)}</p>
      </div>
    </div>
  </div>`}).join('')||'<div class="empty"><p>No transcript for this meeting.</p></div>';

  // ── Export dropdown ───────────────────────────────────
  const aiCleanBtn = CFG.aiKey && m.transcript?.length > 0
    ? `<button class="btn btn-ghost btn-sm btn-purple" onclick="doCleanTranscript()" ${S.aiWorking?'disabled':''} title="AI fixes grammar, punctuation & misheard words">✦ AI clean-up</button>`
    : '';

  const exportDropdown = `
  <div class="dropdown">
    <button class="btn btn-ghost btn-sm" onclick="toggleExportMenu(event)">↓ Export ▾</button>
    <div class="dropdown-menu" id="export-menu" style="display:none">
      <button class="dropdown-item" onclick="copyTranscript();toggleExportMenu()">⎘ Copy to clipboard</button>
      <div class="dropdown-sep"></div>
      <button class="dropdown-item" onclick="exportTxt();toggleExportMenu()">📄 Plain text (.txt)</button>
      <button class="dropdown-item" onclick="exportMd();toggleExportMenu()">📝 Markdown (.md)</button>
      <button class="dropdown-item" onclick="exportJson();toggleExportMenu()">🗂 JSON (.json)</button>
      ${m.audioUrl?`<button class="dropdown-item" onclick="window.open('${esc(m.audioUrl)}');toggleExportMenu()">🔊 Download audio</button>`:''}
    </div>
  </div>`;

  return `
  <div class="view"><div class="wrap">
    <div class="detail-hdr">
      <button class="back-btn" onclick="go('meetings')">← Back</button>
      <div class="detail-acts">
        ${aiCleanBtn}
        ${exportDropdown}
        <button class="btn btn-ghost btn-sm btn-ghost-red" onclick="confirmDelDetail()">🗑 Delete</button>
      </div>
    </div>
    <div class="detail-title-wrap">
      <h1 class="detail-title" id="detail-title-text">${esc(m.title)}</h1>
      <button class="title-edit-btn" onclick="editTitle()" title="Rename meeting">✎</button>
    </div>
    <div class="detail-chips">${chips}</div>
    ${tagsHtml}
    ${audio}
    ${aiPanelHtml}
    ${notesList}
    ${statsPanel}
    ${wfPanel}
    ${search}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <p class="section-lbl" style="margin:0">Transcript ${hasStars?starFilterBtn:''}</p>

    </div>
    <div class="t-body-wrap" id="transcript-body">${lines}</div>
  </div></div>`;
}

/* ─── Event Handlers ────────────────────────────────────*/
function attachEvents() {}

function go(tab) {
  if (S.isRec && tab !== 'recording') return;
  S.tab = tab; S.error = ''; S.aiError = '';
  if (tab === 'meetings' || tab === 'home') dbLoad(); else render();
}

function showForm() {

  const wrap = document.querySelector('.wrap');
  if (!wrap) return;
  const cta = wrap.querySelector('.cta');

  cta.innerHTML = `
    <div class="form-card">
      <label class="form-label" for="meet-title-input">Meeting title <span class="opt">(optional)</span></label>
      <input id="meet-title-input" type="text" placeholder="${esc(defaultTitle)}" autofocus />
      <div class="form-grid">
        <div>
          <label class="form-label" for="form-lang-sel" style="margin-top:10px">Language</label>
          <select id="form-lang-sel" onchange="CFG.lang=this.value">${langs}</select>
        </div>
        <div>
          <label class="form-label" style="margin-top:10px">Confidence filter</label>

        <strong>Capture speaker output too:</strong> A screen-share dialog will appear.

        If you cancel, recording continues with mic only.

  setTimeout(()=>{ const i=el('meet-title-input'); if(i){i.focus(); i.onkeydown=e=>{if(e.key==='Enter')handleStart();}} },50);
