<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceLog — Meeting Transcriber</title>
  <meta name="description" content="Record, transcribe and store your meetings — free, in your browser." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
/* ─── tokens ──────────────────────────────────────────── */
:root{
  --bg:#f5f5f3;--surface:#fff;--surface2:#eeede9;--border:#e2e2de;--border2:#ccc;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --red:#dc2626;--red-dim:#fff0f0;--red-b:#fbd0d0;--red-t:#b91c1c;
  --green:#16a34a;--green-dim:#f0fdf4;--green-b:#bbf7d0;--green-t:#15803d;
  --blue:#2563eb;--blue-dim:#eff6ff;--blue-b:#bfdbfe;--blue-t:#1d4ed8;
  --yellow:#ca8a04;--yellow-dim:#fefce8;--yellow-b:#fde68a;--yellow-t:#a16207;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',system-ui,sans-serif;
  --r:10px;--r-lg:14px;--r-xl:20px;
  --hh:56px;--mw:740px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.05);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0e0e0e;--surface:#191919;--surface2:#242424;--border:#2e2e2e;--border2:#444;
    --text:#e8e8e8;--text2:#999;--text3:#555;
    --red:#f87171;--red-dim:#1f0d0d;--red-b:#7f1d1d;--red-t:#fca5a5;
    --green:#4ade80;--green-dim:#0d1f14;--green-b:#14532d;--green-t:#86efac;
    --blue:#60a5fa;--blue-dim:#0d1929;--blue-b:#1e3a5f;--blue-t:#93c5fd;
    --yellow:#facc15;--yellow-dim:#1c1500;--yellow-b:#713f12;--yellow-t:#fde047;
    --shadow:0 1px 4px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04);
  }
}

/* ─── reset ───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#app{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;overflow:hidden;font-size:15px;line-height:1.55}
button{font-family:var(--sans);cursor:pointer}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
mark{background:var(--yellow-dim);color:var(--yellow-t);border-radius:3px;padding:0 3px}

/* ─── layout ──────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.header{height:var(--hh);border-bottom:1px solid var(--border);background:var(--surface);
  padding:0 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;position:relative;z-index:10}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.view{flex:1;overflow-y:auto;padding-bottom:40px}
.wrap{max-width:var(--mw);margin:0 auto;padding:26px 20px}

/* ─── header pieces ───────────────────────────────────── */
.logo{display:flex;align-items:center;gap:9px;background:none;border:none;
  color:var(--text);font-size:16px;font-weight:700;letter-spacing:-.02em;padding:0}
.logo svg{color:var(--red)}
.rec-pill{display:flex;align-items:center;gap:7px;background:var(--red-dim);
  border:1px solid var(--red-b);color:var(--red-t);border-radius:999px;
  padding:3px 12px;font-size:12px;font-weight:600;font-family:var(--mono);
  position:absolute;left:50%;transform:translateX(-50%)}
.rec-dot{width:7px;height:7px;border-radius:50%;background:var(--red);
  animation:blink 1.1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.storage-chip{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;
  padding:3px 9px;border-radius:999px;border:1px solid var(--border);color:var(--text2)}
.storage-chip.cloud{background:var(--green-dim);color:var(--green-t);border-color:var(--green-b)}
.nav{display:flex;gap:2px}
.nav-btn{background:none;border:1px solid transparent;border-radius:6px;
  padding:5px 13px;font-size:13px;color:var(--text2);transition:all .12s}
.nav-btn:hover:not(:disabled){background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--surface2);border-color:var(--border);color:var(--text);font-weight:500}
.nav-btn:disabled{opacity:.35;cursor:default}
.icon-btn{background:none;border:1px solid var(--border);border-radius:6px;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  color:var(--text2);font-size:16px;transition:all .12s}
.icon-btn:hover:not(:disabled){background:var(--surface2);color:var(--text)}
.icon-btn.active{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.icon-btn:disabled{opacity:.35;cursor:default}

/* ─── buttons ─────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:var(--r);
  padding:8px 16px;font-size:14px;font-weight:500;border:1px solid transparent;transition:all .12s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-xs{padding:3px 9px;font-size:12px}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover:not(:disabled){opacity:.88}
.btn-red{background:var(--red-dim);color:var(--red-t);border-color:var(--red-b)}
.btn-red:hover:not(:disabled){background:var(--red-b)}
.btn-ghost{background:none;color:var(--text2);border-color:var(--border2)}
.btn-ghost:hover:not(:disabled){background:var(--surface2);color:var(--text)}
.btn-ghost-red{color:var(--red-t)}
.btn-ghost-red:hover:not(:disabled){background:var(--red-dim);border-color:var(--red-b)}
.link-btn{background:none;border:none;color:var(--blue);font-size:13px;padding:4px 0}
.link-btn:hover{text-decoration:underline}

/* ─── inputs ──────────────────────────────────────────── */
input,textarea{width:100%;padding:9px 13px;background:var(--surface);color:var(--text);
  border:1px solid var(--border2);border-radius:var(--r);font-size:14px;font-family:var(--sans);
  outline:none;transition:border .12s}
input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim)}
input::placeholder,textarea::placeholder{color:var(--text3)}

/* ─── alerts / badges ─────────────────────────────────── */
.alert{padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:16px;
  display:flex;align-items:flex-start;gap:8px;border:1px solid}
.alert-err{background:var(--red-dim);color:var(--red-t);border-color:var(--red-b)}
.alert-ok{background:var(--green-dim);color:var(--green-t);border-color:var(--green-b)}

.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;
  padding:2px 8px;border-radius:999px;border:1px solid;white-space:nowrap}
.chip-red{background:var(--red-dim);color:var(--red-t);border-color:var(--red-b)}
.chip-green{background:var(--green-dim);color:var(--green-t);border-color:var(--green-b)}
.chip-blue{background:var(--blue-dim);color:var(--blue-t);border-color:var(--blue-b)}
.chip-yellow{background:var(--yellow-dim);color:var(--yellow-t);border-color:var(--yellow-b)}

/* ─── loading / empty ─────────────────────────────────── */
.spinner{width:20px;height:20px;border:2px solid var(--border2);
  border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.spinner-sm{width:12px;height:12px;border:1.5px solid;border-top-color:transparent;
  border-radius:50%;display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--text2);font-size:14px;
  display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-note{font-size:12px;color:var(--text3);max-width:360px;line-height:1.6}
.loading{display:flex;align-items:center;justify-content:center;gap:12px;
  padding:60px 20px;color:var(--text2);font-size:14px}

/* ─── HOME ────────────────────────────────────────────── */
.cta{text-align:center;padding:40px 0 28px}
.cta-desc{color:var(--text2);font-size:14px;margin-bottom:28px}
.rec-btn{position:relative;width:84px;height:84px;border-radius:50%;background:var(--red-dim);
  border:1px solid var(--red-b);color:var(--red);transition:transform .15s,box-shadow .15s}
.rec-btn:hover{transform:scale(1.07);box-shadow:0 0 0 8px var(--red-dim)}
.rec-btn:active{transform:scale(.96)}
.rec-btn-ring{position:absolute;inset:-9px;border-radius:50%;
  border:2px solid var(--red-b);opacity:.4;pointer-events:none}
.cta-label{margin-top:13px;font-weight:600;font-size:15px}
.cta-hint{font-size:12px;color:var(--yellow-t);margin-top:5px}

.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);
  padding:22px;box-shadow:var(--shadow);text-align:left;max-width:440px;margin:0 auto 16px}
.form-label{display:block;font-size:13px;font-weight:500;margin-bottom:8px}
.opt{color:var(--text3);font-weight:400}
.form-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.form-hint{font-size:12px;color:var(--text3);margin-top:10px;line-height:1.55}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:26px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px}
.stat-lbl{font-size:12px;color:var(--text2);margin-bottom:5px}
.stat-val{font-size:24px;font-weight:700;letter-spacing:-.03em}

.section-lbl{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:10px}

.meet-card{width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:14px 16px;margin-bottom:8px;transition:border-color .12s,box-shadow .12s}
.meet-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.meet-card-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:5px}
.meet-card-title{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.meet-card-dur{font-family:var(--mono);font-size:12px;color:var(--text2);flex-shrink:0}
.meet-card-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);flex-wrap:wrap}
.meet-card-preview{font-size:13px;color:var(--text3);margin-top:7px;line-height:1.5;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}

/* ─── RECORDING ───────────────────────────────────────── */
.rec-view{flex:1;display:flex;flex-direction:column;overflow:hidden}
.rec-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.rec-bar-left{min-width:0;flex:1}
.rec-title{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.rec-bar-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.meter{display:flex;align-items:center;gap:2px}
.mbar{width:3px;border-radius:3px;background:var(--border2);transition:background .07s}
.mbar.on{background:var(--red)}
.rec-time{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--red);min-width:64px;text-align:right}
.stop-btn{display:flex;align-items:center;gap:7px}
.stop-sq{width:11px;height:11px;background:var(--red);border-radius:2px;flex-shrink:0}

/* ─── TRANSCRIPT AREA ─────────────────────────────────── */
.transcript-scroll{flex:1;overflow-y:auto;padding:24px 20px;max-width:var(--mw);
  margin:0 auto;width:100%;box-sizing:border-box}

.t-empty{display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;padding:80px 20px;text-align:center}
.t-empty-icon{width:56px;height:56px;border-radius:50%;border:2px solid var(--red-b);
  display:flex;align-items:center;justify-content:center;animation:pulse 2.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.14);opacity:.3}}
.t-empty-title{font-size:16px;font-weight:600;color:var(--text)}
.t-empty-sub{font-size:13px;color:var(--text2);max-width:340px;line-height:1.6}

/* Individual transcript line — this is the HERO */
.t-line{display:flex;gap:16px;margin-bottom:22px;animation:fadein .22s ease}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.t-ts{font-family:var(--mono);font-size:11px;color:var(--text3);padding-top:4px;
  min-width:72px;flex-shrink:0;line-height:1}
.t-body{flex:1}
.t-speaker{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.03em;
  text-transform:uppercase;margin-bottom:5px}
.t-text{font-size:17px;line-height:1.65;color:var(--text);font-weight:400}
.t-line.interim .t-text{color:var(--text3);font-style:italic;font-size:16px}

/* ─── MEETINGS LIST ───────────────────────────────────── */
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.025em}
.count-badge{font-size:12px;color:var(--text2);background:var(--surface2);
  border:1px solid var(--border);border-radius:999px;padding:1px 9px}
.search-wrap{position:relative;display:flex;align-items:center;margin-bottom:18px;
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:0 14px}
.search-wrap:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim)}
.search-ico{font-size:14px;color:var(--text3);flex-shrink:0}
.search-inp{border:none;box-shadow:none;padding:9px 10px;flex:1;background:transparent}
.search-inp:focus{border:none;box-shadow:none}
.search-x{background:none;border:none;color:var(--text3);font-size:20px;line-height:1;cursor:pointer;padding:0 4px}
.search-x:hover{color:var(--text)}

.meet-row{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden;margin-bottom:8px;transition:border-color .12s}
.meet-row:hover{border-color:var(--border2)}
.meet-row-main{flex:1;text-align:left;background:none;border:none;padding:14px 16px}
.meet-row-top{display:flex;justify-content:space-between;gap:12px;margin-bottom:5px}
.meet-row-title{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.meet-row-dur{font-family:var(--mono);font-size:12px;color:var(--text2);flex-shrink:0}
.meet-row-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);flex-wrap:wrap}
.meet-row-preview{font-size:12px;color:var(--text3);margin-top:6px;line-height:1.5;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.meet-row-del{display:flex;align-items:center;padding:0 10px;border-left:1px solid var(--border)}
.confirm-del{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);padding:0 4px;white-space:nowrap}

/* ─── DETAIL ──────────────────────────────────────────── */
.detail-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap}
.back-btn{background:none;border:none;color:var(--blue);font-size:14px;padding:0}
.back-btn:hover{text-decoration:underline}
.detail-acts{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.confirm-del-inline{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.detail-title{font-size:24px;font-weight:700;letter-spacing:-.03em;margin-bottom:10px;line-height:1.25}
.detail-chips{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--text2);margin-bottom:20px}
.audio-wrap{margin-bottom:22px}
.audio-lbl{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:7px}
audio{width:100%;height:38px;border-radius:var(--r)}
.detail-search{margin-bottom:22px}
.t-body-wrap{display:flex;flex-direction:column}

/* ─── SETTINGS ────────────────────────────────────────── */
.mode-banner{padding:13px 16px;border-radius:var(--r-lg);font-size:13px;border:1px solid var(--border);
  background:var(--surface2);margin-bottom:26px;color:var(--text2)}
.mode-banner.cloud{background:var(--green-dim);border-color:var(--green-b);color:var(--green-t)}
.settings-sec{margin-bottom:34px}
.settings-sec-title{font-size:16px;font-weight:600;margin-bottom:8px}
.settings-desc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:16px}
.steps{font-size:13px;color:var(--text2);line-height:1.9;padding-left:20px;margin-bottom:18px}
.steps code{font-family:var(--mono);font-size:12px;background:var(--surface2);
  border:1px solid var(--border);padding:1px 5px;border-radius:4px;color:var(--text)}
.fields{display:flex;flex-direction:column;gap:14px;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:13px;font-weight:500}
.settings-btns{display:flex;gap:8px;flex-wrap:wrap}
.tech-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tech-tag{font-size:11px;background:var(--surface2);border:1px solid var(--border);
  border-radius:999px;padding:2px 10px;color:var(--text2)}

/* ─── scrollbar ───────────────────────────────────────── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ─── responsive ──────────────────────────────────────── */
@media(max-width:580px){
  .stats-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .stat-val{font-size:20px}
  .rec-bar{padding:10px 14px;flex-wrap:wrap}
  .meter{display:none}
  .t-text{font-size:16px}
  .detail-title{font-size:20px}
  .wrap{padding:18px 14px}
  .rec-time{font-size:17px}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ════════════════════════════════════════════════════════
//  VoiceLog — single-file app for GitHub Pages
// ════════════════════════════════════════════════════════

/* ─── State ─────────────────────────────────────────────*/
const S = {
  tab: 'home',          // home | recording | meetings | detail | settings
  meetings: [],
  selected: null,
  loading: true,
  saving: false,
  isRec: false,
  recTime: 0,
  lines: [],            // live transcript lines
  interim: '',
  audioLevel: 0,
  sources: {mic:false, sys:false},
  meetTitle: '',
  mode: 'local',        // 'local' | 'cloud'
  error: '',
  // recorder internals
  _recognition: null,
  _recorder: null,
  _chunks: [],
  _timer: null,
  _raf: null,
  _actx: null,
  _linesSnap: [],
  _timeSnap: 0,
  _titleSnap: '',
  _srcSnap: {mic:false, sys:false},
};

/* ─── Helpers ───────────────────────────────────────────*/
const fmt = s => {
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return h>0 ? `${h}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
};
const pad = n => String(n).padStart(2,'0');
const fmtDate = d => {
  const dt = d instanceof Date ? d : new Date(d);
  return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})
    +' · '+dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
};
const fmtRel = d => {
  const dt = d instanceof Date ? d : new Date(d);
  const diff = Date.now()-dt.getTime();
  const m=Math.floor(diff/60000), h=Math.floor(diff/3600000), days=Math.floor(diff/86400000);
  if(m<1) return 'Just now';
  if(m<60) return `${m}m ago`;
  if(h<24) return `${h}h ago`;
  if(days<7) return `${days}d ago`;
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
};
const fmtTs = () => new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const el = id => document.getElementById(id);
const hasSpeech = !!(window.SpeechRecognition||window.webkitSpeechRecognition);

/* ─── Local Storage DB ──────────────────────────────────*/
const LOCAL_KEY = 'voicelog_v1';
const SB_CFG_KEY = 'voicelog_sb_config';

function localLoad() {
  try { return JSON.parse(localStorage.getItem(LOCAL_KEY)||'[]'); } catch { return []; }
}
function localSave(arr) { localStorage.setItem(LOCAL_KEY, JSON.stringify(arr)); }
function sbCfg() {
  try { return JSON.parse(localStorage.getItem(SB_CFG_KEY)||'{}'); } catch { return {}; }
}
function sbClient() {
  const {url,key} = sbCfg();
  if(!url||!key||!window.supabase) return null;
  return window.supabase.createClient(url,key);
}
function isCloud() { const {url,key}=sbCfg(); return !!(url&&key); }

/* ─── DB Layer ──────────────────────────────────────────*/
async function dbLoad() {
  S.loading = true; render();
  try {
    if(isCloud()) {
      const sb = sbClient();
      const {data:rows, error:e} = await sb.from('meetings').select('*').order('date',{ascending:false});
      if(e) throw e;
      if(!rows?.length){ S.meetings=[]; S.loading=false; S.mode='cloud'; render(); return; }
      const ids = rows.map(r=>r.id);
      const {data:lines, error:le} = await sb.from('transcript_lines').select('*').in('meeting_id',ids).order('line_order',{ascending:true});
      if(le) throw le;
      const map={};
      (lines||[]).forEach(l=>{ map[l.meeting_id]=map[l.meeting_id]||[]; map[l.meeting_id].push(l); });
      S.meetings = rows.map(r=>({
        id:r.id, title:r.title, date:new Date(r.date), duration:r.duration,
        wordCount:r.word_count, hasMic:r.has_mic, hasSystem:r.has_system, audioUrl:r.audio_url,
        transcript:(map[r.id]||[]).map(l=>({id:l.id,text:l.text,speaker:l.speaker,ts:l.ts}))
      }));
      S.mode='cloud';
    } else {
      S.meetings = localLoad().map(m=>({...m, date:new Date(m.date)}));
      S.mode='local';
    }
  } catch(err) { S.error='Failed to load meetings: '+err.message; }
  S.loading=false; render();
}

async function dbSave(meeting, audioBlob) {
  if(isCloud()) {
    const sb = sbClient();
    let audioUrl=null;
    if(audioBlob) {
      const fn = `${Date.now()}.webm`;
      const {data:up, error:ue} = await sb.storage.from('recordings').upload(fn, audioBlob, {contentType:'audio/webm'});
      if(!ue&&up) {
        const {data:{publicUrl}} = sb.storage.from('recordings').getPublicUrl(up.path);
        audioUrl = publicUrl;
      }
    }
    const {data:row, error:me} = await sb.from('meetings').insert({
      title:meeting.title, date:meeting.date instanceof Date?meeting.date.toISOString():meeting.date,
      duration:meeting.duration, word_count:meeting.wordCount,
      has_mic:meeting.hasMic, has_system:meeting.hasSystem, audio_url:audioUrl
    }).select().single();
    if(me) throw me;
    if(meeting.transcript?.length) {
      const lrows = meeting.transcript.map((l,i)=>({meeting_id:row.id,text:l.text,speaker:l.speaker,ts:l.ts,line_order:i}));
      await sb.from('transcript_lines').insert(lrows);
    }
    return {...meeting, id:row.id, audioUrl};
  }
  const stored = {...meeting, date:meeting.date instanceof Date?meeting.date.toISOString():meeting.date, audioUrl:meeting.audioUrl||null};
  const all = localLoad();
  all.unshift(stored);
  localSave(all);
  return {...stored, date:new Date(stored.date)};
}

async function dbDelete(id) {
  if(isCloud()) {
    const sb=sbClient();
    const {error:e} = await sb.from('meetings').delete().eq('id',id);
    if(e) throw e;
  } else {
    localSave(localLoad().filter(m=>String(m.id)!==String(id)));
  }
}

async function dbSearch(q) {
  const lq = q.toLowerCase().trim();
  if(!lq) return S.meetings;
  if(isCloud()) {
    const sb=sbClient();
    const {data:th}=await sb.from('meetings').select('id').ilike('title',`%${lq}%`);
    const {data:lh}=await sb.from('transcript_lines').select('meeting_id').ilike('text',`%${lq}%`);
    const ids=new Set([...(th||[]).map(r=>r.id),...(lh||[]).map(r=>r.meeting_id)]);
    return S.meetings.filter(m=>ids.has(m.id));
  }
  return S.meetings.filter(m=>
    m.title.toLowerCase().includes(lq)||
    m.transcript?.some(l=>l.text.toLowerCase().includes(lq))
  );
}

/* ─── Continuous Speech Recognizer ──────────────────────
 *
 * WHY breaks happen with plain SpeechRecognition:
 *   1. Chrome auto-stops after ~60 s of any session
 *   2. Chrome stops after ~5-8 s of silence (no-speech)
 *   3. Reusing the same stopped instance throws an error
 *   4. The gap between onend → start() loses words
 *
 * FIX — three-layer defence:
 *   A. Fresh instance every restart (Chrome rejects re-used ones)
 *   B. Immediate restart inside onend (< 50 ms gap)
 *   C. Watchdog timer: if the instance has been dead for
 *      > 1.5 s without us intending to stop, force-restart
 * ────────────────────────────────────────────────────── */
const Recognizer = (() => {
  let _alive      = false;   // true while we want recognition running
  let _running    = false;   // true between onstart and onend
  let _restarting = false;   // debounce: one restart at a time
  let _instance   = null;    // current SpeechRecognition object
  let _watchdog   = null;    // interval handle
  let _onResult   = null;    // callback(text, isFinal)

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  function _spawn() {
    if (!_alive || _restarting) return;
    _restarting = true;

    // Always create a brand-new instance — Chrome refuses to restart
    // a stopped one and throws InvalidStateError
    const r = new SR();
    _instance = r;
    r.continuous     = true;
    r.interimResults = true;
    r.lang           = 'en-US';
    r.maxAlternatives = 1;

    r.onstart = () => {
      _running    = true;
      _restarting = false;
    };

    r.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          const text = e.results[i][0].transcript.trim();
          if (text && _onResult) _onResult(text, true);
        } else {
          interim += e.results[i][0].transcript;
        }
      }
      if (_onResult) _onResult(interim, false);
    };

    r.onerror = (e) => {
      // 'not-allowed' = user denied mic; stop permanently
      if (e.error === 'not-allowed') { _alive = false; return; }
      // 'aborted' = we called abort() ourselves; onend will handle restart
      // everything else (no-speech, network, audio-capture) → let onend restart
      _running = false;
    };

    r.onend = () => {
      _running    = false;
      _restarting = false;
      if (!_alive) return;
      // Restart immediately with a tiny delay so the browser
      // can release its audio capture lock cleanly
      setTimeout(_spawn, 80);
    };

    try {
      r.start();
    } catch (err) {
      // start() can throw if called too quickly — back off and retry
      _restarting = false;
      _running    = false;
      if (_alive) setTimeout(_spawn, 250);
    }
  }

  return {
    start(onResult) {
      if (!SR) return false;
      _alive      = true;
      _running    = false;
      _restarting = false;
      _onResult   = onResult;
      _spawn();

      // Watchdog: poll every 1.5 s — if we're alive but not running
      // and not already restarting, kick it back to life
      _watchdog = setInterval(() => {
        if (_alive && !_running && !_restarting) {
          console.warn('[VoiceLog] Recognizer stalled — forcing restart');
          _spawn();
        }
      }, 1500);

      return true;
    },

    stop() {
      _alive      = false;
      _running    = false;
      _restarting = false;
      clearInterval(_watchdog);
      _watchdog = null;
      try { _instance?.abort(); } catch {}
      _instance = null;
    },
  };
})();

/* ─── Recording Engine ──────────────────────────────────*/
async function startRecording(title) {
  S.error = '';

  // 1 ── Microphone (required)
  let micStream;
  try { micStream = await navigator.mediaDevices.getUserMedia({audio:true,video:false}); }
  catch { S.error = 'Microphone access denied — please allow it and try again.'; render(); return; }

  // 2 ── System audio via screen-share (optional)
  const src = {mic:true, sys:false};
  let sysStream = null;
  try {
    sysStream = await navigator.mediaDevices.getDisplayMedia({
      audio: {echoCancellation:false, noiseSuppression:false, sampleRate:44100},
      video: {width:1, height:1, frameRate:1},
    });
    if (sysStream.getAudioTracks().length) src.sys = true;
  } catch {}

  S.sources = src; S._srcSnap = {...src};

  // 3 ── Web Audio: mix streams + level meter
  try {
    const ctx = new AudioContext(); S._actx = ctx;
    const dest = ctx.createMediaStreamDestination();
    ctx.createMediaStreamSource(micStream).connect(dest);
    if (sysStream?.getAudioTracks().length)
      ctx.createMediaStreamSource(sysStream).connect(dest);

    const analyser = ctx.createAnalyser(); analyser.fftSize = 64;
    ctx.createMediaStreamSource(micStream).connect(analyser);
    const buf = new Uint8Array(analyser.frequencyBinCount);
    const tick = () => {
      analyser.getByteFrequencyData(buf);
      S.audioLevel = Math.min(1, buf.reduce((a,v)=>a+v,0) / buf.length / 45);
      document.querySelectorAll('.mbar').forEach((b,i) =>
        b.classList.toggle('on', S.audioLevel * 16 > i));
      S._raf = requestAnimationFrame(tick);
    };
    tick();

    // 4 ── MediaRecorder on the mixed stream
    const rec = new MediaRecorder(dest.stream);
    S._recorder = rec; S._chunks = [];
    rec.ondataavailable = e => { if (e.data.size > 0) S._chunks.push(e.data); };
    rec.start(1000);
  } catch(e) { console.error('Audio setup:', e); }

  // 5 ── Continuous speech recognition (never stops until we say so)
  Recognizer.start((text, isFinal) => {
    if (isFinal) {
      const line = {id: Date.now() + Math.random(), text, speaker:'You', ts: fmtTs()};
      S.lines.push(line);
      S._linesSnap = [...S.lines];
      appendTranscriptLine(line);
      removeInterim();
    } else {
      S.interim = text;
      updateInterim(text);
    }
  });

  // 6 ── Wall-clock timer
  const t0 = Date.now();
  S._timer = setInterval(() => {
    S.recTime   = Math.floor((Date.now() - t0) / 1000);
    S._timeSnap = S.recTime;
    const te = el('rec-timer');  if (te) te.textContent = fmt(S.recTime);
    const he = el('hdr-timer');  if (he) he.textContent = 'REC ' + fmt(S.recTime);
  }, 1000);

  S.meetTitle = title; S._titleSnap = title;
  S.lines = []; S._linesSnap = [];
  S.interim = ''; S.recTime = 0; S.isRec = true;
  S.tab = 'recording'; render();
}

function stopRecording() {
  return new Promise(resolve => {
    // Stop the continuous recognizer cleanly
    Recognizer.stop();
    clearInterval(S._timer);
    cancelAnimationFrame(S._raf);
    try { S._actx?.close(); } catch {}

    const lines     = [...S._linesSnap];
    const dur       = S._timeSnap;
    const title     = S._titleSnap;
    const src       = {...S._srcSnap};
    const wordCount = lines.reduce((a,l) => a + l.text.split(' ').length, 0);

    S.isRec = false; S.audioLevel = 0; S.interim = ''; S.recTime = 0;

    const done = blob => resolve({
      id: Date.now().toString(), title, date: new Date(), duration: dur,
      transcript: lines, audioBlob: blob, hasMic: src.mic, hasSystem: src.sys, wordCount,
    });

    if (S._recorder?.state !== 'inactive') {
      S._recorder.onstop = () =>
        done(S._chunks.length ? new Blob(S._chunks, {type:'audio/webm'}) : null);
      S._recorder.stop();
    } else {
      done(null);
    }
  });
}

/* ─── Live transcript DOM helpers ───────────────────────*/
function appendTranscriptLine(line) {
  const area=el('transcript-area'); if(!area) return;
  const empty=area.querySelector('.t-empty'); if(empty) empty.remove();
  const div=document.createElement('div');
  div.className='t-line'; div.id='tl-'+line.id;
  div.innerHTML=`<span class="t-ts">${esc(line.ts)}</span>
  <div class="t-body">
    <div class="t-speaker">${esc(line.speaker)}</div>
    <p class="t-text">${esc(line.text)}</p>
  </div>`;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}

function updateInterim(text) {
  let itm=el('interim-line');
  if(!text){ if(itm) itm.remove(); return; }
  const area=el('transcript-area'); if(!area) return;
  if(!itm){
    itm=document.createElement('div');
    itm.className='t-line interim'; itm.id='interim-line';
    area.appendChild(itm);
  }
  itm.innerHTML=`<span class="t-ts">…</span>
  <div class="t-body">
    <div class="t-speaker">You</div>
    <p class="t-text">${esc(text)}</p>
  </div>`;
  area.scrollTop=area.scrollHeight;
}

function removeInterim() {
  const itm=el('interim-line'); if(itm) itm.remove();
}

/* ─── Render ────────────────────────────────────────────*/
function render() {
  el('app').innerHTML = buildApp();
  attachEvents();
}

function buildApp() {
  return `
  ${buildHeader()}
  <main class="main">
    ${ S.tab==='home'      ? buildHome()      :
       S.tab==='recording' ? buildRecording() :
       S.tab==='meetings'  ? buildMeetings()  :
       S.tab==='detail'    ? buildDetail()    :
       S.tab==='settings'  ? buildSettings()  : '' }
  </main>`;
}

function buildHeader() {
  const recBadge = S.isRec
    ? `<div class="rec-pill"><span class="rec-dot"></span><span id="hdr-timer">REC ${fmt(S.recTime)}</span></div>`
    : '';
  const storageBadge = `<span class="storage-chip ${S.mode==='cloud'?'cloud':''}" title="${S.mode==='cloud'?'Synced to Supabase':'Stored locally in browser'}">
    ${S.mode==='cloud'?'☁ Cloud':'💾 Local'}</span>`;
  const nav = ['home','meetings'].map(v=>`
    <button class="nav-btn ${S.tab===v?'active':''}" onclick="go('${v}')"
      ${S.isRec&&v!==S.tab?'disabled':''}>
      ${v==='home'?'Home':'Meetings'}
    </button>`).join('');
  const settingsActive = S.tab==='settings'?'active':'';
  return `
  <header class="header">
    <button class="logo" onclick="go('home')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" x2="12" y1="19" y2="22"/>
      </svg>
      VoiceLog
    </button>
    ${recBadge}
    <div class="hdr-right">
      ${storageBadge}
      <nav class="nav">${nav}</nav>
      <button class="icon-btn ${settingsActive}" onclick="go('settings')" ${S.isRec?'disabled':''} title="Settings">⚙</button>
    </div>
  </header>`;
}

function buildHome() {
  const totalSecs = S.meetings.reduce((a,m)=>a+(m.duration||0),0);
  const totalWords = S.meetings.reduce((a,m)=>a+(m.wordCount||0),0);
  const err = S.error ? `<div class="alert alert-err">⚠ ${esc(S.error)}</div>` : '';
  const cta = `
  <div class="cta">
    <p class="cta-desc">Record your mic and meeting audio — transcript appears live</p>
    <button class="rec-btn" onclick="showForm()" aria-label="Start recording">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" x2="12" y1="19" y2="22"/>
      </svg>
      <span class="rec-btn-ring"></span>
    </button>
    <p class="cta-label">New recording</p>
    ${!hasSpeech ? '<p class="cta-hint">⚠ Use Chrome / Edge for live transcription</p>' : ''}
  </div>`;

  const statsHtml = S.meetings.length>0 ? `
  <div class="stats-grid">
    <div class="stat"><p class="stat-lbl">Meetings</p><p class="stat-val">${S.meetings.length}</p></div>
    <div class="stat"><p class="stat-lbl">Minutes</p><p class="stat-val">${Math.round(totalSecs/60)}</p></div>
    <div class="stat"><p class="stat-lbl">Words</p><p class="stat-val">${totalWords.toLocaleString()}</p></div>
  </div>
  <p class="section-lbl">Recent meetings</p>
  ${S.meetings.slice(0,4).map(m=>`
  <button class="meet-card" onclick="viewMeeting('${esc(m.id)}')">
    <div class="meet-card-top">
      <span class="meet-card-title">${esc(m.title)}</span>
      <span class="meet-card-dur">${fmt(m.duration)}</span>
    </div>
    <div class="meet-card-meta">
      <span>${fmtRel(m.date)}</span>
      <span>·</span>
      <span>${m.wordCount} words</span>
      ${m.hasSystem?'<span class="chip chip-green">System audio</span>':''}
    </div>
    ${m.transcript?.[0] ? `<p class="meet-card-preview">"${esc(m.transcript[0].text)}"</p>` : ''}
  </button>`).join('')}
  ${S.meetings.length>4 ? `<button class="link-btn" onclick="go('meetings')">View all ${S.meetings.length} meetings →</button>` : ''}
  ` : '';

  const emptyHtml = !S.loading && S.meetings.length===0 && !S.error ? `
  <div class="empty">
    <p>No recordings yet — hit the button above to start your first meeting.</p>
    ${S.mode==='local'?`<p class="empty-note">Meetings are saved in your browser. Open Settings to connect Supabase for cross-device cloud storage.</p>`:''}
  </div>` : '';

  const loadingHtml = S.loading ? `<div class="loading"><div class="spinner"></div> Loading meetings…</div>` : '';

  return `<div class="view"><div class="wrap">${err}${cta}${loadingHtml}${statsHtml}${emptyHtml}</div></div>`;
}

function buildRecording() {
  const bars = Array.from({length:16}).map((_,i)=>
    `<span class="mbar ${S.audioLevel*16>i?'on':''}" style="height:${6+(i%6)*3}px"></span>`
  ).join('');

  const srcChips = [
    S.sources.mic?'<span class="chip chip-red">🎙 Mic</span>':'',
    S.sources.sys?'<span class="chip chip-green">🖥 System audio</span>':'',
    !hasSpeech?'<span class="chip chip-yellow">⚠ Use Chrome for live text</span>':'',
  ].join('');

  const linesHtml = S.lines.map(l=>`
  <div class="t-line" id="tl-${l.id}">
    <span class="t-ts">${esc(l.ts)}</span>
    <div class="t-body">
      <div class="t-speaker">${esc(l.speaker)}</div>
      <p class="t-text">${esc(l.text)}</p>
    </div>
  </div>`).join('');

  const emptyMsg = S.lines.length===0 && !S.interim ? `
  <div class="t-empty">
    <div class="t-empty-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      </svg>
    </div>
    <p class="t-empty-title">Listening…</p>
    <p class="t-empty-sub">Start speaking — your words appear here in real time as the conversation unfolds.</p>
    ${!hasSpeech?`<p class="t-empty-sub" style="color:var(--yellow-t)">Live transcription needs Chrome or Edge. Audio is still being recorded.</p>`:''}
  </div>` : '';

  const interimHtml = S.interim ? `
  <div class="t-line interim" id="interim-line">
    <span class="t-ts">…</span>
    <div class="t-body">
      <div class="t-speaker">You</div>
      <p class="t-text">${esc(S.interim)}</p>
    </div>
  </div>` : '';

  const stopLabel = S.saving
    ? `<span class="spinner-sm"></span> Saving…`
    : `<span class="stop-sq"></span> Stop recording`;

  return `
  <div class="rec-view">
    <div class="rec-bar">
      <div class="rec-bar-left">
        <div class="rec-title">${esc(S.meetTitle)}</div>
        <div class="rec-chips">${srcChips}</div>
      </div>
      <div class="rec-bar-right">
        <div class="meter">${bars}</div>
        <div class="rec-time" id="rec-timer">${fmt(S.recTime)}</div>
        <button class="btn btn-red stop-btn" onclick="handleStop()" ${S.saving?'disabled':''}>
          ${stopLabel}
        </button>
      </div>
    </div>
    <div class="transcript-scroll" id="transcript-area">
      ${emptyMsg}${linesHtml}${interimHtml}
    </div>
  </div>`;
}

function buildMeetings() {
  const listHtml = S.meetings.length===0
    ? `<div class="empty"><p>No meetings recorded yet.</p></div>`
    : S.meetings.map(m=>`
  <div class="meet-row">
    <button class="meet-row-main" onclick="viewMeeting('${esc(m.id)}')">
      <div class="meet-row-top">
        <span class="meet-row-title">${esc(m.title)}</span>
        <span class="meet-row-dur">${fmt(m.duration)}</span>
      </div>
      <div class="meet-row-meta">
        <span>${fmtDate(m.date)}</span>
        <span>·</span>
        <span>${m.wordCount} words</span>
        ${m.hasSystem?'<span class="chip chip-green">System</span>':''}
        ${m.audioUrl?'<span class="chip chip-blue">▶ Audio</span>':''}
      </div>
      ${m.transcript?.[0]?`<p class="meet-row-preview">"${esc(m.transcript[0].text)}"</p>`:''}
    </button>
    <div class="meet-row-del">
      <button class="icon-btn" onclick="confirmDel(event,'${esc(m.id)}')" title="Delete">🗑</button>
    </div>
  </div>`).join('');

  return `
  <div class="view"><div class="wrap">
    <div class="page-hdr">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="page-title">Meetings</span>
        <span class="count-badge">${S.meetings.length}</span>
      </div>
      <button class="icon-btn" onclick="dbLoad()" title="Refresh">↻</button>
    </div>
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input class="search-inp" type="search" id="search-input" placeholder="Search meetings and transcripts…"
        oninput="handleSearch(this.value)" />
      <button class="search-x" onclick="clearSearch()" id="search-x" style="display:none">×</button>
    </div>
    <div id="meetings-list">${listHtml}</div>
  </div></div>`;
}

function buildDetail() {
  const m = S.selected;
  if(!m) return '<div class="view"><div class="wrap"><p>Meeting not found.</p></div></div>';

  const chips = [
    fmtDate(m.date),
    '·',
    fmt(m.duration),
    '·',
    m.wordCount+' words',
    m.hasMic    ? '<span class="chip chip-red">🎙 Mic</span>' : '',
    m.hasSystem ? '<span class="chip chip-green">🖥 System audio</span>' : '',
  ].join(' ');

  const audio = m.audioUrl
    ? `<div class="audio-wrap"><p class="audio-lbl">Recording</p><audio controls src="${esc(m.audioUrl)}"></audio></div>` : '';

  const search = m.transcript?.length>3
    ? `<div class="detail-search">
        <div class="search-wrap">
          <span class="search-ico">🔍</span>
          <input class="search-inp" type="search" placeholder="Find in transcript…"
            oninput="highlightTranscript(this.value)" id="detail-search" />
          <button class="search-x" onclick="clearDetailSearch()">×</button>
        </div>
       </div>` : '';

  const lines = m.transcript?.map(l=>`
  <div class="t-line">
    <span class="t-ts">${esc(l.ts||l.timestamp||'')}</span>
    <div class="t-body">
      <div class="t-speaker">${esc(l.speaker)}</div>
      <p class="t-text" data-raw="${esc(l.text)}">${esc(l.text)}</p>
    </div>
  </div>`).join('')||'<div class="empty"><p>No transcript for this meeting.</p></div>';

  return `
  <div class="view"><div class="wrap">
    <div class="detail-hdr">
      <button class="back-btn" onclick="go('meetings')">← Back</button>
      <div class="detail-acts">
        <button class="btn btn-ghost btn-sm" onclick="copyTranscript()">⎘ Copy</button>
        <button class="btn btn-ghost btn-sm" onclick="exportTxt()">↓ .txt</button>
        <button class="btn btn-ghost btn-sm btn-ghost-red" onclick="confirmDelDetail()">🗑 Delete</button>
      </div>
    </div>
    <h1 class="detail-title">${esc(m.title)}</h1>
    <div class="detail-chips">${chips}</div>
    ${audio}
    ${search}
    <div class="t-body-wrap" id="transcript-body">${lines}</div>
  </div></div>`;
}

function buildSettings() {
  const cfg = sbCfg();
  const modeBanner = isCloud()
    ? `<div class="mode-banner cloud">☁️ <strong>Cloud storage active</strong> — meetings synced to Supabase</div>`
    : `<div class="mode-banner">💾 <strong>Local storage active</strong> — data is saved in this browser only</div>`;

  return `
  <div class="view"><div class="wrap" style="max-width:580px">
    <h1 class="page-title" style="margin-bottom:22px">Settings</h1>
    ${modeBanner}

    <section class="settings-sec">
      <h2 class="settings-sec-title">☁ Supabase — free cloud database</h2>
      <p class="settings-desc">
        Connect a free <a href="https://supabase.com" target="_blank">Supabase</a> project to persist
        meetings across sessions and devices. Transcripts go to PostgreSQL, audio files to Supabase Storage.
      </p>
      <ol class="steps">
        <li>Create a free project at <a href="https://supabase.com" target="_blank">supabase.com</a></li>
        <li>Open <strong>SQL Editor</strong> → paste and run the schema from <a href="https://github.com/chanura04/voicelog/blob/main/supabase/schema.sql" target="_blank">schema.sql</a></li>
        <li>Go to <strong>Project Settings → API</strong> → copy your URL and anon key</li>
        <li>Paste below → Test → Save</li>
      </ol>
      <div class="fields">
        <div class="field">
          <label class="field-label" for="sb-url">Project URL</label>
          <input id="sb-url" type="url" placeholder="https://xxxxxxxxxxxx.supabase.co" value="${esc(cfg.url||'')}" />
        </div>
        <div class="field">
          <label class="field-label" for="sb-key">Anon public key</label>
          <input id="sb-key" type="password" placeholder="eyJh…" value="${esc(cfg.key||'')}" />
        </div>
      </div>
      <div id="sb-status"></div>
      <div class="settings-btns">
        <button class="btn btn-ghost btn-sm" onclick="testSB()">⚡ Test connection</button>
        <button class="btn btn-primary btn-sm" onclick="saveSB()">Save</button>
        ${isCloud()?`<button class="btn btn-ghost btn-sm btn-ghost-red" onclick="clearSB()">Disconnect</button>`:''}
      </div>
    </section>

    <section class="settings-sec">
      <h2 class="settings-sec-title">About VoiceLog</h2>
      <p class="settings-desc">
        Open source, MIT license. Single HTML file — no build tools, no server needed.<br/>
        Deploy by uploading <code>index.html</code> to any GitHub repo with Pages enabled.
      </p>
      <div class="tech-row">
        <span class="tech-tag">Web Speech API</span>
        <span class="tech-tag">MediaRecorder API</span>
        <span class="tech-tag">Web Audio API</span>
        <span class="tech-tag">Supabase</span>
        <span class="tech-tag">Vanilla JS</span>
      </div>
    </section>
  </div></div>`;
}

/* ─── Event Handlers ────────────────────────────────────*/
function attachEvents() {}

function go(tab) {
  if(S.isRec && tab!=='recording') return;
  S.tab=tab; S.error='';
  if(tab==='meetings' || tab==='home') dbLoad(); else render();
}

function showForm() {
  S.tab='home'; render();
  // show inline form
  const wrap = document.querySelector('.wrap');
  if(!wrap) return;
  const cta = wrap.querySelector('.cta');
  const defaultTitle = `Meeting — ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
  cta.innerHTML = `
    <div class="form-card">
      <label class="form-label" for="meet-title-input">Meeting title <span class="opt">(optional)</span></label>
      <input id="meet-title-input" type="text" placeholder="${esc(defaultTitle)}" autofocus />
      <div class="form-row">
        <button class="btn btn-red" onclick="handleStart()">⏺ Start recording</button>
        <button class="btn btn-ghost" onclick="render()">Cancel</button>
      </div>
      <p class="form-hint">Browser will ask for mic permission, then optionally screen-share for system audio. Check "Share audio" when prompted.</p>
    </div>`;
  setTimeout(()=>{ const i=el('meet-title-input'); if(i){i.focus(); i.onkeydown=e=>{if(e.key==='Enter')handleStart();}} },50);
}

async function handleStart() {
  const inp = el('meet-title-input');
  const defaultTitle = `Meeting — ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
  const title = (inp?.value||'').trim() || defaultTitle;
  await startRecording(title);
}

async function handleStop() {
  S.saving=true; render();
  try {
    const result = await stopRecording();
    const {audioBlob, ...mdata} = result;
    const saved = await dbSave(mdata, audioBlob);
    S.meetings.unshift(saved);
    S.selected=saved;
    S.tab='detail';
  } catch(e){ S.error='Save failed: '+e.message; S.tab='home'; }
  S.saving=false; render();
}

function viewMeeting(id) {
  S.selected = S.meetings.find(m=>String(m.id)===String(id))||null;
  S.tab='detail'; render();
}

let searchTimer=null;
async function handleSearch(q) {
  const x=el('search-x'); if(x) x.style.display=q?'block':'none';
  clearTimeout(searchTimer);
  searchTimer=setTimeout(async()=>{
    const found = await dbSearch(q);
    const list=el('meetings-list'); if(!list) return;
    if(found.length===0){
      list.innerHTML=`<div class="empty">${q?`No meetings match "${esc(q)}"`:'No meetings yet.'}</div>`;
    } else {
      list.innerHTML=found.map(m=>`
      <div class="meet-row">
        <button class="meet-row-main" onclick="viewMeeting('${esc(m.id)}')">
          <div class="meet-row-top">
            <span class="meet-row-title">${esc(m.title)}</span>
            <span class="meet-row-dur">${fmt(m.duration)}</span>
          </div>
          <div class="meet-row-meta">
            <span>${fmtDate(m.date)}</span>
            <span>·</span>
            <span>${m.wordCount} words</span>
            ${m.hasSystem?'<span class="chip chip-green">System</span>':''}
            ${m.audioUrl?'<span class="chip chip-blue">▶ Audio</span>':''}
          </div>
          ${m.transcript?.[0]?`<p class="meet-row-preview">"${esc(m.transcript[0].text)}"</p>`:''}
        </button>
        <div class="meet-row-del">
          <button class="icon-btn" onclick="confirmDel(event,'${esc(m.id)}')" title="Delete">🗑</button>
        </div>
      </div>`).join('');
    }
  }, 300);
}

function clearSearch() {
  const inp=el('search-input'); if(inp) inp.value='';
  const x=el('search-x'); if(x) x.style.display='none';
  handleSearch('');
}

function confirmDel(evt, id) {
  evt.stopPropagation();
  const btn=evt.currentTarget;
  const wrap=btn.closest('.meet-row-del');
  wrap.innerHTML=`<div class="confirm-del">
    <span>Delete?</span>
    <button class="btn btn-red btn-xs" onclick="doDelete(event,'${esc(id)}')">Yes</button>
    <button class="btn btn-ghost btn-xs" onclick="cancelDel(event)">No</button>
  </div>`;
}

async function doDelete(evt, id) {
  evt.stopPropagation();
  try {
    await dbDelete(id);
    S.meetings = S.meetings.filter(m=>String(m.id)!==String(id));
    render();
  } catch(e){ alert('Delete failed: '+e.message); }
}

function cancelDel(evt) {
  evt.stopPropagation();
  const row=evt.currentTarget.closest('.meet-row');
  const wrap=row?.querySelector('.meet-row-del');
  if(!wrap) return;
  const id=row.querySelector('.meet-row-main')?.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
  wrap.innerHTML=`<button class="icon-btn" onclick="confirmDel(event,'${esc(id||'')}')" title="Delete">🗑</button>`;
}

function confirmDelDetail() {
  const acts=document.querySelector('.detail-acts');
  if(!acts) return;
  acts.innerHTML=`<div class="confirm-del-inline">
    <span>Delete this meeting?</span>
    <button class="btn btn-red btn-xs" onclick="doDeleteDetail()">Yes, delete</button>
    <button class="btn btn-ghost btn-xs" onclick="render()">Cancel</button>
  </div>`;
}

async function doDeleteDetail() {
  const id=S.selected?.id; if(!id) return;
  try {
    await dbDelete(id);
    S.meetings=S.meetings.filter(m=>String(m.id)!==String(id));
    S.selected=null; S.tab='meetings'; render();
  } catch(e){ alert('Delete failed: '+e.message); }
}

function highlightTranscript(q) {
  document.querySelectorAll('#transcript-body .t-text').forEach(el=>{
    const raw=el.getAttribute('data-raw')||el.textContent;
    el.setAttribute('data-raw',raw);
    if(!q.trim()){ el.innerHTML=esc(raw); return; }
    const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    el.innerHTML=esc(raw).replace(re,'<mark>$1</mark>');
  });
}

function clearDetailSearch() {
  const inp=el('detail-search'); if(inp) inp.value='';
  highlightTranscript('');
}

function copyTranscript() {
  const m=S.selected; if(!m) return;
  const text=m.transcript.map(l=>`[${l.ts||''}] ${l.speaker}: ${l.text}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('.detail-acts .btn-ghost');
    if(btn){ btn.textContent='✓ Copied!'; setTimeout(()=>{btn.textContent='⎘ Copy';},2000); }
  });
}

function exportTxt() {
  const m=S.selected; if(!m) return;
  const lines=[
    `VoiceLog Transcript`,``,
    `Title:    ${m.title}`,
    `Date:     ${fmtDate(m.date)}`,
    `Duration: ${fmt(m.duration)}`,
    `Words:    ${m.wordCount}`,``,
    `── Transcript ──`,``,
    ...m.transcript.map(l=>`[${l.ts||''}] ${l.speaker}: ${l.text}`)
  ].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines],{type:'text/plain'}));
  a.download=m.title.replace(/[^a-z0-9]/gi,'_')+'.txt';
  a.click();
}

/* ─── Settings handlers ─────────────────────────────────*/
async function testSB() {
  const url=(el('sb-url')?.value||'').trim();
  const key=(el('sb-key')?.value||'').trim();
  const status=el('sb-status');
  if(!url||!key){ if(status) status.innerHTML=`<div class="alert alert-err">Please enter both URL and key.</div>`; return; }
  if(status) status.innerHTML=`<div class="loading"><div class="spinner"></div> Testing…</div>`;
  try {
    const sb=window.supabase.createClient(url,key);
    const {error}=await sb.from('meetings').select('id').limit(1);
    if(error) throw error;
    if(status) status.innerHTML=`<div class="alert alert-ok">✓ Connected successfully!</div>`;
  } catch(e) {
    if(status) status.innerHTML=`<div class="alert alert-err">✗ ${esc(e.message)}</div>`;
  }
}

function saveSB() {
  const url=(el('sb-url')?.value||'').trim();
  const key=(el('sb-key')?.value||'').trim();
  const status=el('sb-status');
  if(!url||!key){ if(status) status.innerHTML=`<div class="alert alert-err">Please enter both fields.</div>`; return; }
  localStorage.setItem(SB_CFG_KEY, JSON.stringify({url,key}));
  S.mode='cloud';
  if(status) status.innerHTML=`<div class="alert alert-ok">✓ Saved! Switching to cloud storage…</div>`;
  setTimeout(()=>dbLoad(), 800);
}

function clearSB() {
  localStorage.removeItem(SB_CFG_KEY);
  S.mode='local';
  const status=el('sb-status');
  if(status) status.innerHTML=`<div class="alert alert-ok">Disconnected. Switched to local storage.</div>`;
  setTimeout(()=>dbLoad(), 600);
}

/* ─── Init ───────────────────────────────────────────────*/
dbLoad();
</script>
</body>
</html>
